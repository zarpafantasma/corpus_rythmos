<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000">
  <defs>
    <linearGradient id="metalGradE" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a5568"/>
      <stop offset="50%" style="stop-color:#718096"/>
      <stop offset="100%" style="stop-color:#4a5568"/>
    </linearGradient>
    <linearGradient id="coreGradE" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#805ad5"/>
      <stop offset="100%" style="stop-color:#553c9a"/>
    </linearGradient>
    <linearGradient id="gradientZoneE" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3182ce"/>
      <stop offset="100%" style="stop-color:#805ad5"/>
    </linearGradient>
    <linearGradient id="nozzleGradE" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3182ce"/>
      <stop offset="100%" style="stop-color:#63b3ed"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="1000" fill="#1a202c"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0">AETHERION MARK 1</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a0aec0">Exploded Assembly View</text>
  
  <!-- Central axis line -->
  <line x1="400" y1="80" x2="400" y2="950" stroke="#4a5568" stroke-width="1" stroke-dasharray="10,5"/>
  
  <!-- THRUST direction -->
  <path d="M400 80 L400 100" stroke="#48bb78" stroke-width="3"/>
  <polygon points="400,70 390,85 410,85" fill="#48bb78"/>
  <text x="430" y="80" font-family="Arial, sans-serif" font-size="12" fill="#48bb78">THRUST ↑</text>
  
  <!-- Component 1: Top Cover -->
  <g transform="translate(0, 0)">
    <ellipse cx="400" cy="130" rx="100" ry="20" fill="url(#metalGradE)" stroke="#2d3748" stroke-width="2"/>
    <rect x="300" y="130" width="200" height="15" fill="url(#metalGradE)" stroke="#2d3748" stroke-width="2"/>
    <ellipse cx="400" cy="145" rx="100" ry="20" fill="#5a6270" stroke="#2d3748" stroke-width="2"/>
    
    <!-- Label -->
    <line x1="510" y1="137" x2="600" y2="137" stroke="#718096" stroke-width="1"/>
    <circle cx="510" cy="137" r="3" fill="#718096"/>
    <text x="610" y="133" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" font-weight="bold">1. TOP COVER</text>
    <text x="610" y="147" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">Aluminum 6061-T6</text>
  </g>
  
  <!-- Connector line -->
  <line x1="400" y1="165" x2="400" y2="190" stroke="#48bb78" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Component 2: Nozzle Cone -->
  <g transform="translate(0, 50)">
    <path d="M310 180 L400 230 L490 180 L490 165 L310 165 Z" fill="url(#nozzleGradE)" stroke="#2d3748" stroke-width="2"/>
    <ellipse cx="400" cy="165" rx="90" ry="18" fill="#63b3ed" stroke="#2d3748" stroke-width="2"/>
    
    <!-- Aperture -->
    <ellipse cx="400" cy="230" rx="50" ry="10" fill="#1a202c" stroke="#4299e1" stroke-width="1"/>
    <text x="400" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#4299e1">Ø25mm</text>
    
    <!-- Label -->
    <line x1="510" y1="195" x2="600" y2="195" stroke="#718096" stroke-width="1"/>
    <circle cx="510" cy="195" r="3" fill="#718096"/>
    <text x="610" y="191" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" font-weight="bold">2. NOZZLE CONE</text>
    <text x="610" y="205" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">Metamaterial α=2.0→2.5</text>
  </g>
  
  <!-- Connector line -->
  <line x1="400" y1="290" x2="400" y2="320" stroke="#48bb78" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Component 3: Gradient Stack -->
  <g transform="translate(0, 110)">
    <ellipse cx="400" cy="250" rx="85" ry="17" fill="#3182ce" stroke="#2d3748" stroke-width="2"/>
    <rect x="315" y="250" width="170" height="100" fill="url(#gradientZoneE)" stroke="#2d3748" stroke-width="2"/>
    <ellipse cx="400" cy="350" rx="85" ry="17" fill="#805ad5" stroke="#2d3748" stroke-width="2"/>
    
    <!-- Layer lines -->
    <g stroke="#2d3748" stroke-width="0.5" opacity="0.5">
      <line x1="320" y1="263" x2="480" y2="263"/>
      <line x1="320" y1="276" x2="480" y2="276"/>
      <line x1="320" y1="289" x2="480" y2="289"/>
      <line x1="320" y1="302" x2="480" y2="302"/>
      <line x1="320" y1="315" x2="480" y2="315"/>
      <line x1="320" y1="328" x2="480" y2="328"/>
      <line x1="320" y1="341" x2="480" y2="341"/>
    </g>
    
    <!-- Label -->
    <line x1="510" y1="300" x2="600" y2="300" stroke="#718096" stroke-width="1"/>
    <circle cx="510" cy="300" r="3" fill="#718096"/>
    <text x="610" y="291" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" font-weight="bold">3. GRADIENT STACK</text>
    <text x="610" y="305" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">15 layers, α: 2.0→0.5</text>
    <text x="610" y="318" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">∇α = 200 m⁻¹</text>
  </g>
  
  <!-- Connector line -->
  <line x1="400" y1="470" x2="400" y2="500" stroke="#48bb78" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Component 4: Accumulator Core -->
  <g transform="translate(0, 200)">
    <ellipse cx="400" cy="340" rx="85" ry="17" fill="url(#coreGradE)" stroke="#2d3748" stroke-width="2"/>
    <rect x="315" y="340" width="170" height="50" fill="url(#coreGradE)" stroke="#2d3748" stroke-width="2"/>
    <ellipse cx="400" cy="390" rx="85" ry="17" fill="#553c9a" stroke="#2d3748" stroke-width="2"/>
    
    <!-- Glow effect -->
    <ellipse cx="400" cy="365" rx="60" ry="12" fill="#9f7aea" opacity="0.3"/>
    <text x="400" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">φ_max</text>
    
    <!-- Label -->
    <line x1="510" y1="365" x2="600" y2="365" stroke="#718096" stroke-width="1"/>
    <circle cx="510" cy="365" r="3" fill="#718096"/>
    <text x="610" y="356" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" font-weight="bold">4. ACCUMULATOR</text>
    <text x="610" y="370" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">α = 0.5 (constant)</text>
    <text x="610" y="383" font-family="Arial, sans-serif" font-size="9" fill="#d6bcfa">ZPE Storage Zone</text>
  </g>
  
  <!-- Connector line -->
  <line x1="400" y1="610" x2="400" y2="640" stroke="#48bb78" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Component 5: Piezo Ring -->
  <g transform="translate(0, 260)">
    <ellipse cx="400" cy="420" rx="90" ry="18" fill="#d69e2e" stroke="#2d3748" stroke-width="2"/>
    <rect x="310" y="420" width="180" height="25" fill="#ecc94b" stroke="#2d3748" stroke-width="2"/>
    <ellipse cx="400" cy="445" rx="90" ry="18" fill="#b7791f" stroke="#2d3748" stroke-width="2"/>
    
    <!-- Piezo element indicators -->
    <g fill="#b7791f">
      <rect x="325" y="425" width="12" height="15"/>
      <rect x="350" y="425" width="12" height="15"/>
      <rect x="375" y="425" width="12" height="15"/>
      <rect x="400" y="425" width="12" height="15"/>
      <rect x="425" y="425" width="12" height="15"/>
      <rect x="450" y="425" width="12" height="15"/>
      <rect x="475" y="425" width="12" height="15"/>
    </g>
    
    <!-- Label -->
    <line x1="510" y1="432" x2="600" y2="432" stroke="#718096" stroke-width="1"/>
    <circle cx="510" cy="432" r="3" fill="#718096"/>
    <text x="610" y="423" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" font-weight="bold">5. PIEZO ARRAY</text>
    <text x="610" y="437" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">8× PZT-5H actuators</text>
    <text x="610" y="450" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">Phase-controlled, 200V</text>
  </g>
  
  <!-- Connector line -->
  <line x1="400" y1="725" x2="400" y2="755" stroke="#48bb78" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Component 6: Base Reflector -->
  <g transform="translate(0, 310)">
    <ellipse cx="400" cy="485" rx="90" ry="18" fill="#2b6cb0" stroke="#2d3748" stroke-width="2"/>
    <rect x="310" y="485" width="180" height="20" fill="#2b6cb0" stroke="#2d3748" stroke-width="2"/>
    <ellipse cx="400" cy="505" rx="90" ry="18" fill="#1e4e8c" stroke="#2d3748" stroke-width="2"/>
    
    <!-- Label -->
    <line x1="510" y1="495" x2="600" y2="495" stroke="#718096" stroke-width="1"/>
    <circle cx="510" cy="495" r="3" fill="#718096"/>
    <text x="610" y="486" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" font-weight="bold">6. BASE REFLECTOR</text>
    <text x="610" y="500" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">α = 2.5 (prevents backflow)</text>
  </g>
  
  <!-- Connector line -->
  <line x1="400" y1="835" x2="400" y2="865" stroke="#48bb78" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Component 7: Electronics Bay -->
  <g transform="translate(0, 350)">
    <ellipse cx="400" cy="555" rx="100" ry="20" fill="#2d3748" stroke="#4a5568" stroke-width="2"/>
    <rect x="300" y="555" width="200" height="50" fill="#2d3748" stroke="#4a5568" stroke-width="2"/>
    <ellipse cx="400" cy="605" rx="100" ry="20" fill="#1a202c" stroke="#4a5568" stroke-width="2"/>
    
    <!-- PCB representations -->
    <rect x="320" y="565" width="40" height="25" fill="#276749" stroke="#48bb78" stroke-width="1"/>
    <text x="340" y="582" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">MCU</text>
    
    <rect x="370" y="565" width="30" height="25" fill="#276749" stroke="#48bb78" stroke-width="1"/>
    <text x="385" y="582" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">DDS</text>
    
    <rect x="410" y="565" width="35" height="25" fill="#9c4221" stroke="#ed8936" stroke-width="1"/>
    <text x="428" y="582" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">AMP</text>
    
    <rect x="455" y="565" width="30" height="25" fill="#2c5282" stroke="#4299e1" stroke-width="1"/>
    <text x="470" y="582" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">PSU</text>
    
    <!-- Label -->
    <line x1="510" y1="580" x2="600" y2="580" stroke="#718096" stroke-width="1"/>
    <circle cx="510" cy="580" r="3" fill="#718096"/>
    <text x="610" y="571" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" font-weight="bold">7. ELECTRONICS BAY</text>
    <text x="610" y="585" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">STM32H7, AD9910, PA94×8</text>
  </g>
  
  <!-- Component 8: Mounting Flange -->
  <g transform="translate(0, 390)">
    <ellipse cx="400" cy="630" rx="120" ry="24" fill="url(#metalGradE)" stroke="#2d3748" stroke-width="2"/>
    <rect x="280" y="630" width="240" height="15" fill="url(#metalGradE)" stroke="#2d3748" stroke-width="2"/>
    <ellipse cx="400" cy="645" rx="120" ry="24" fill="#5a6270" stroke="#2d3748" stroke-width="2"/>
    
    <!-- Mounting holes -->
    <circle cx="320" cy="637" r="5" fill="#1a202c" stroke="#2d3748" stroke-width="1"/>
    <circle cx="400" cy="637" r="5" fill="#1a202c" stroke="#2d3748" stroke-width="1"/>
    <circle cx="480" cy="637" r="5" fill="#1a202c" stroke="#2d3748" stroke-width="1"/>
    
    <!-- Label -->
    <line x1="510" y1="637" x2="600" y2="637" stroke="#718096" stroke-width="1"/>
    <circle cx="510" cy="637" r="3" fill="#718096"/>
    <text x="610" y="628" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" font-weight="bold">8. MOUNTING FLANGE</text>
    <text x="610" y="642" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">3× M4 mounting holes</text>
  </g>
  
  <!-- Assembly order box -->
  <rect x="50" y="120" width="140" height="150" fill="#2d3748" stroke="#4a5568" stroke-width="1" rx="5"/>
  <text x="120" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" font-weight="bold">ASSEMBLY ORDER</text>
  <text x="60" y="170" font-family="Arial, sans-serif" font-size="9" fill="#48bb78">8 → Flange first</text>
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">7 → Electronics</text>
  <text x="60" y="200" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">6 → Base</text>
  <text x="60" y="215" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">5 → Piezo ring</text>
  <text x="60" y="230" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">4 → Accumulator</text>
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">3 → Gradient stack</text>
  <text x="60" y="260" font-family="Arial, sans-serif" font-size="9" fill="#48bb78">2 → Nozzle last</text>
  
  <!-- Footer -->
  <text x="400" y="980" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#718096">AETHERION MARK 1 | Exploded View | Rev 1.0</text>
</svg>
