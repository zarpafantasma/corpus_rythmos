<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750">
  <defs>
    <!-- Heat gradient -->
    <linearGradient id="heatGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#2b6cb0"/>
      <stop offset="30%" style="stop-color:#48bb78"/>
      <stop offset="60%" style="stop-color:#ecc94b"/>
      <stop offset="100%" style="stop-color:#e53e3e"/>
    </linearGradient>
    <linearGradient id="finGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a5568"/>
      <stop offset="50%" style="stop-color:#718096"/>
      <stop offset="100%" style="stop-color:#4a5568"/>
    </linearGradient>
    <linearGradient id="piezoHeat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ed8936"/>
      <stop offset="100%" style="stop-color:#c05621"/>
    </linearGradient>
    <!-- Airflow arrows -->
    <marker id="airArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#63b3ed"/>
    </marker>
    <marker id="heatArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ed8936"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="750" fill="#1a202c"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0">THERMAL MANAGEMENT SYSTEM</text>
  <text x="450" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a0aec0">Red Team Advisory Compliance - Thermal Depolarization Prevention</text>
  
  <!-- Warning Box -->
  <rect x="200" y="70" width="500" height="50" fill="#742a2a" stroke="#e53e3e" stroke-width="2" rx="5"/>
  <text x="450" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#feb2b2">⚠ CRITICAL: PZT-5H Curie Temperature = 195C</text>
  <text x="450" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fc8181">Operating Limit: 90C | Safe: below 70C | Depolarization = Permanent Failure</text>
  
  <!-- Left Panel: Cross-section with thermal paths -->
  <rect x="30" y="140" width="420" height="450" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="10"/>
  <text x="240" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0">THERMAL PATH CROSS-SECTION</text>
  
  <!-- Heatsink with fins (top cover redesign) -->
  <rect x="120" y="190" width="240" height="20" fill="url(#finGrad)" stroke="#2d3748" stroke-width="1"/>
  
  <!-- Fins -->
  <g fill="#718096" stroke="#4a5568" stroke-width="1">
    <rect x="130" y="145" width="8" height="45"/>
    <rect x="150" y="145" width="8" height="45"/>
    <rect x="170" y="145" width="8" height="45"/>
    <rect x="190" y="145" width="8" height="45"/>
    <rect x="210" y="145" width="8" height="45"/>
    <rect x="230" y="145" width="8" height="45"/>
    <rect x="250" y="145" width="8" height="45"/>
    <rect x="270" y="145" width="8" height="45"/>
    <rect x="290" y="145" width="8" height="45"/>
    <rect x="310" y="145" width="8" height="45"/>
    <rect x="330" y="145" width="8" height="45"/>
    <rect x="350" y="145" width="8" height="45"/>
  </g>
  
  <!-- Airflow arrows through fins -->
  <g stroke="#63b3ed" stroke-width="2" fill="none" marker-end="url(#airArrow)">
    <path d="M100 170 C120 170, 130 160, 140 150"/>
    <path d="M100 175 C120 175, 150 165, 180 155"/>
    <path d="M100 180 C120 180, 180 170, 220 160"/>
  </g>
  <text x="75" y="180" font-family="Arial, sans-serif" font-size="9" fill="#63b3ed">AIR</text>
  
  <!-- Airflow out -->
  <g stroke="#63b3ed" stroke-width="2" fill="none" marker-end="url(#airArrow)">
    <path d="M340 155 C360 160, 370 165, 390 170"/>
    <path d="M300 158 C330 163, 360 170, 390 175"/>
    <path d="M260 162 C290 167, 350 175, 390 180"/>
  </g>
  
  <text x="240" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">HEATSINK TOP COVER (Al 6061-T6)</text>
  <text x="240" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a0aec0">12 fins, 5mm spacing, 45mm height</text>
  
  <!-- Thermal Interface Material -->
  <rect x="120" y="245" width="240" height="8" fill="#48bb78" stroke="#276749" stroke-width="1"/>
  <text x="240" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#1a202c">TIM (Arctic Silver 5)</text>
  
  <!-- Piezo Array (heat source) -->
  <rect x="120" y="258" width="240" height="40" fill="url(#piezoHeat)" stroke="#c05621" stroke-width="2"/>
  
  <!-- Heat radiation from piezo -->
  <g stroke="#ed8936" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M140 278 Q130 268, 140 258"/>
    <path d="M145 278 Q132 265, 145 252"/>
    <path d="M180 278 Q170 268, 180 258"/>
    <path d="M185 278 Q172 265, 185 252"/>
    <path d="M220 278 Q210 268, 220 258"/>
    <path d="M260 278 Q250 268, 260 258"/>
    <path d="M300 278 Q290 268, 300 258"/>
    <path d="M340 278 Q330 268, 340 258"/>
  </g>
  
  <!-- Piezo elements -->
  <g fill="#b7791f">
    <rect x="130" y="268" width="20" height="20" rx="2"/>
    <rect x="160" y="268" width="20" height="20" rx="2"/>
    <rect x="190" y="268" width="20" height="20" rx="2"/>
    <rect x="220" y="268" width="20" height="20" rx="2"/>
    <rect x="250" y="268" width="20" height="20" rx="2"/>
    <rect x="280" y="268" width="20" height="20" rx="2"/>
    <rect x="310" y="268" width="20" height="20" rx="2"/>
    <rect x="340" y="268" width="20" height="20" rx="2"/>
  </g>
  
  <text x="240" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">PIEZO ARRAY (8x PZT-5H) - HEAT SOURCE</text>
  <text x="240" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ed8936">Generates ~5-50W thermal load at HV operation</text>
  
  <!-- Temperature sensors -->
  <g fill="#38a169">
    <circle cx="145" y="278" r="5"/>
    <circle cx="215" y="278" r="5"/>
    <circle cx="285" y="278" r="5"/>
    <circle cx="355" y="278" r="5"/>
  </g>
  <text x="240" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#38a169">● PT1000 RTD Sensors (4x) - Direct contact monitoring</text>
  
  <!-- Core below (low heat) -->
  <rect x="140" y="360" width="200" height="60" fill="#553c9a" stroke="#805ad5" stroke-width="1"/>
  <text x="240" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">METAMATERIAL CORE</text>
  <text x="240" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#d6bcfa">Low thermal load (passive)</text>
  
  <!-- Housing walls -->
  <rect x="100" y="190" width="15" height="240" fill="#4a5568"/>
  <rect x="365" y="190" width="15" height="240" fill="#4a5568"/>
  
  <!-- Heat flow arrows -->
  <g stroke="#ed8936" stroke-width="2" fill="none" marker-end="url(#heatArrow)">
    <line x1="180" y1="260" x2="180" y2="235"/>
    <line x1="240" y1="260" x2="240" y2="235"/>
    <line x1="300" y1="260" x2="300" y2="235"/>
  </g>
  <text x="240" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ed8936">Heat Flow ↑</text>
  
  <!-- Temperature scale -->
  <rect x="400" y="200" width="30" height="200" fill="url(#heatGrad)" stroke="#4a5568" stroke-width="1"/>
  <text x="415" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e53e3e">195C</text>
  <text x="415" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e53e3e">CURIE</text>
  <text x="415" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ed8936">90C</text>
  <text x="415" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#ed8936">LIMIT</text>
  <text x="415" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ecc94b">70C</text>
  <text x="415" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#ecc94b">WARN</text>
  <text x="415" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#48bb78">50C</text>
  <text x="415" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#48bb78">SAFE</text>
  <text x="415" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2b6cb0">25C</text>
  
  <!-- Thermal budget table -->
  <rect x="50" y="450" width="380" height="120" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  <text x="240" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" font-weight="bold">THERMAL BUDGET</text>
  
  <text x="70" y="495" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">Source</text>
  <text x="200" y="495" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">Power</text>
  <text x="280" y="495" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">Mitigation</text>
  
  <line x1="60" y1="502" x2="420" y2="502" stroke="#4a5568" stroke-width="1"/>
  
  <text x="70" y="518" font-family="Arial, sans-serif" font-size="9" fill="#ed8936">Piezo Dielectric Loss</text>
  <text x="200" y="518" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">~30W</text>
  <text x="280" y="518" font-family="Arial, sans-serif" font-size="9" fill="#48bb78">Heatsink fins</text>
  
  <text x="70" y="535" font-family="Arial, sans-serif" font-size="9" fill="#ed8936">Piezo Mechanical Loss</text>
  <text x="200" y="535" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">~15W</text>
  <text x="280" y="535" font-family="Arial, sans-serif" font-size="9" fill="#48bb78">TIM contact</text>
  
  <text x="70" y="552" font-family="Arial, sans-serif" font-size="9" fill="#ed8936">HV Amplifier (PA94)</text>
  <text x="200" y="552" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">~5W</text>
  <text x="280" y="552" font-family="Arial, sans-serif" font-size="9" fill="#48bb78">Separate heatsinks</text>
  
  <text x="70" y="569" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" font-weight="bold">TOTAL</text>
  <text x="200" y="569" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" font-weight="bold">~50W</text>
  <text x="280" y="569" font-family="Arial, sans-serif" font-size="9" fill="#ecc94b">Duty cycle limit</text>
  
  <!-- Right Panel: Duty Cycle and Timing -->
  <rect x="470" y="140" width="400" height="220" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="10"/>
  <text x="670" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0">DUTY CYCLE THERMAL CONTROL</text>
  
  <!-- Timing diagram -->
  <rect x="490" y="185" width="360" height="80" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  
  <!-- Fire pulse -->
  <rect x="510" y="200" width="60" height="40" fill="#e53e3e" opacity="0.8"/>
  <text x="540" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">FIRE</text>
  <text x="540" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">10s MAX</text>
  
  <!-- Cooldown period -->
  <rect x="570" y="200" width="180" height="40" fill="#2b6cb0" opacity="0.5"/>
  <text x="660" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#63b3ed">COOLDOWN</text>
  <text x="660" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#63b3ed">60s MINIMUM</text>
  
  <!-- Next fire -->
  <rect x="750" y="200" width="60" height="40" fill="#e53e3e" opacity="0.8"/>
  <text x="780" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">FIRE</text>
  
  <!-- Timeline -->
  <line x1="510" y1="255" x2="830" y2="255" stroke="#718096" stroke-width="1"/>
  <text x="510" y="270" font-family="Arial, sans-serif" font-size="8" fill="#718096">0s</text>
  <text x="570" y="270" font-family="Arial, sans-serif" font-size="8" fill="#718096">10s</text>
  <text x="750" y="270" font-family="Arial, sans-serif" font-size="8" fill="#718096">70s</text>
  <text x="810" y="270" font-family="Arial, sans-serif" font-size="8" fill="#718096">80s</text>
  
  <!-- Duty cycle calculation -->
  <text x="670" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ecc94b">Duty Cycle = 10s / 70s = 14.3% MAX</text>
  <text x="670" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0">MCU enforces this automatically (hardcoded)</text>
  <text x="670" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e53e3e">Manual override PROHIBITED</text>
  
  <!-- Temperature response graph -->
  <rect x="470" y="370" width="400" height="220" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="10"/>
  <text x="670" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0">TEMPERATURE RESPONSE</text>
  
  <!-- Graph area -->
  <rect x="520" y="415" width="300" height="150" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  
  <!-- Y axis -->
  <line x1="520" y1="420" x2="520" y2="560" stroke="#718096" stroke-width="1"/>
  <text x="510" y="425" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#e53e3e">90C</text>
  <line x1="515" y1="425" x2="520" y2="425" stroke="#e53e3e" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="520" y1="425" x2="820" y2="425" stroke="#e53e3e" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  
  <text x="510" y="460" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#ecc94b">70C</text>
  <line x1="515" y1="460" x2="520" y2="460" stroke="#ecc94b" stroke-width="1"/>
  <line x1="520" y1="460" x2="820" y2="460" stroke="#ecc94b" stroke-width="1" stroke-dasharray="3,2" opacity="0.3"/>
  
  <text x="510" y="500" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#48bb78">50C</text>
  <text x="510" y="555" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#718096">25C</text>
  
  <!-- X axis -->
  <line x1="520" y1="555" x2="820" y2="555" stroke="#718096" stroke-width="1"/>
  <text x="520" y="570" font-family="Arial, sans-serif" font-size="8" fill="#718096">0</text>
  <text x="620" y="570" font-family="Arial, sans-serif" font-size="8" fill="#718096">30s</text>
  <text x="720" y="570" font-family="Arial, sans-serif" font-size="8" fill="#718096">60s</text>
  <text x="810" y="570" font-family="Arial, sans-serif" font-size="8" fill="#718096">90s</text>
  
  <!-- Temperature curve - with heatsink (good) -->
  <path d="M520 550 
           Q540 540, 560 490 
           Q580 470, 600 480
           Q650 500, 700 520
           Q750 535, 800 540" 
        stroke="#48bb78" stroke-width="2" fill="none"/>
  <text x="750" y="515" font-family="Arial, sans-serif" font-size="8" fill="#48bb78">With heatsink</text>
  
  <!-- Temperature curve - without heatsink (bad) -->
  <path d="M520 550 
           Q540 520, 560 450 
           Q580 420, 600 410
           Q620 405, 640 420
           Q700 400, 750 410" 
        stroke="#e53e3e" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <text x="680" y="405" font-family="Arial, sans-serif" font-size="8" fill="#e53e3e">NO heatsink (FAIL)</text>
  
  <!-- Fire period indicator -->
  <rect x="520" y="545" width="60" height="10" fill="#ed8936" opacity="0.5"/>
  <text x="550" y="553" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#fff">FIRE</text>
  
  <!-- Bottom: Component requirements -->
  <rect x="30" y="605" width="840" height="120" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="10"/>
  <text x="450" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0">THERMAL MANAGEMENT COMPONENTS</text>
  
  <!-- Component table -->
  <line x1="50" y1="645" x2="850" y2="645" stroke="#4a5568" stroke-width="1"/>
  
  <text x="120" y="660" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" font-weight="bold">Component</text>
  <text x="300" y="660" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" font-weight="bold">Specification</text>
  <text x="500" y="660" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" font-weight="bold">Purpose</text>
  <text x="700" y="660" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" font-weight="bold">BOM ID</text>
  
  <line x1="50" y1="668" x2="850" y2="668" stroke="#4a5568" stroke-width="1"/>
  
  <text x="120" y="685" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Heatsink Top Cover</text>
  <text x="300" y="685" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Al 6061-T6, 12 fins, 45mm</text>
  <text x="500" y="685" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#48bb78">Primary heat dissipation</text>
  <text x="700" y="685" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4299e1">MC-001</text>
  
  <text x="120" y="702" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Thermal Paste</text>
  <text x="300" y="702" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Arctic Silver 5, 8.9 W/mK</text>
  <text x="500" y="702" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#48bb78">Piezo-heatsink interface</text>
  <text x="700" y="702" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4299e1">MC-005</text>
  
  <text x="120" y="719" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">PT1000 Sensors (4x)</text>
  <text x="300" y="719" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Class A, 2mm probe</text>
  <text x="500" y="719" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#48bb78">Real-time temp monitoring</text>
  <text x="700" y="719" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4299e1">SN-001</text>
  
</svg>
