<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <!-- Background -->
  <rect width="900" height="600" fill="#1a202c"/>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0">AETHERION MARK 1 - ELECTRICAL SCHEMATIC</text>
  
  <!-- Power Input Section -->
  <rect x="30" y="60" width="120" height="80" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="5"/>
  <text x="90" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" font-weight="bold">POWER INPUT</text>
  <text x="90" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#48bb78">24V DC</text>
  <text x="90" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">5A max</text>
  
  <!-- Power connector symbol -->
  <circle cx="90" cy="55" r="8" fill="none" stroke="#48bb78" stroke-width="2"/>
  <line x1="90" y1="47" x2="90" y2="40" stroke="#48bb78" stroke-width="2"/>
  <text x="90" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#48bb78">+24V</text>
  
  <!-- Line from Power to regulators -->
  <line x1="150" y1="100" x2="200" y2="100" stroke="#48bb78" stroke-width="2"/>
  
  <!-- Junction -->
  <circle cx="200" cy="100" r="4" fill="#48bb78"/>
  
  <!-- Branch to 5V regulator -->
  <line x1="200" y1="100" x2="200" y2="70" stroke="#48bb78" stroke-width="2"/>
  <line x1="200" y1="70" x2="250" y2="70" stroke="#48bb78" stroke-width="2"/>
  
  <!-- 5V Regulator -->
  <rect x="250" y="50" width="80" height="40" fill="#2d3748" stroke="#276749" stroke-width="2" rx="3"/>
  <text x="290" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">VREG</text>
  <text x="290" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#48bb78">24V → 5V</text>
  
  <!-- Branch to HV Boost -->
  <line x1="200" y1="100" x2="200" y2="130" stroke="#48bb78" stroke-width="2"/>
  <line x1="200" y1="130" x2="250" y2="130" stroke="#48bb78" stroke-width="2"/>
  
  <!-- HV Boost Converter -->
  <rect x="250" y="110" width="80" height="40" fill="#2d3748" stroke="#ed8936" stroke-width="2" rx="3"/>
  <text x="290" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">HV BOOST</text>
  <text x="290" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ed8936">24V → 200V</text>
  
  <!-- 5V line to MCU -->
  <line x1="330" y1="70" x2="400" y2="70" stroke="#48bb78" stroke-width="2"/>
  
  <!-- MCU Block -->
  <rect x="400" y="50" width="100" height="60" fill="#2d3748" stroke="#4299e1" stroke-width="2" rx="5"/>
  <text x="450" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" font-weight="bold">MCU</text>
  <text x="450" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4299e1">STM32H743</text>
  <text x="450" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a0aec0">480MHz ARM</text>
  
  <!-- MCU to DDS -->
  <line x1="500" y1="80" x2="550" y2="80" stroke="#4299e1" stroke-width="2"/>
  <text x="525" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#4299e1">SPI</text>
  
  <!-- DDS Block -->
  <rect x="550" y="55" width="80" height="50" fill="#2d3748" stroke="#9f7aea" stroke-width="2" rx="3"/>
  <text x="590" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" font-weight="bold">DDS</text>
  <text x="590" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#9f7aea">AD9910</text>
  
  <!-- DDS to DAC -->
  <line x1="630" y1="80" x2="680" y2="80" stroke="#9f7aea" stroke-width="2"/>
  
  <!-- DAC Block -->
  <rect x="680" y="55" width="70" height="50" fill="#2d3748" stroke="#9f7aea" stroke-width="2" rx="3"/>
  <text x="715" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" font-weight="bold">DAC</text>
  <text x="715" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#9f7aea">AD5764</text>
  
  <!-- HV to Amplifier array -->
  <line x1="330" y1="130" x2="400" y2="130" stroke="#ed8936" stroke-width="2"/>
  <line x1="400" y1="130" x2="400" y2="200" stroke="#ed8936" stroke-width="2"/>
  
  <!-- 8-Channel HV Amplifier -->
  <rect x="350" y="200" width="180" height="80" fill="#2d3748" stroke="#ed8936" stroke-width="2" rx="5"/>
  <text x="440" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" font-weight="bold">8-CH HV AMPLIFIER</text>
  <text x="440" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ed8936">PA94 × 8</text>
  <text x="440" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">0-200V Output</text>
  
  <!-- DAC to Amplifier -->
  <line x1="715" y1="105" x2="715" y2="170" stroke="#9f7aea" stroke-width="1"/>
  <line x1="715" y1="170" x2="530" y2="170" stroke="#9f7aea" stroke-width="1"/>
  <line x1="530" y1="170" x2="530" y2="200" stroke="#9f7aea" stroke-width="1"/>
  <text x="620" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#9f7aea">8× Analog</text>
  
  <!-- Amplifier outputs to Piezo Array -->
  <g stroke="#ed8936" stroke-width="2">
    <line x1="360" y1="280" x2="360" y2="340"/>
    <line x1="380" y1="280" x2="380" y2="340"/>
    <line x1="400" y1="280" x2="400" y2="340"/>
    <line x1="420" y1="280" x2="420" y2="340"/>
    <line x1="440" y1="280" x2="440" y2="340"/>
    <line x1="460" y1="280" x2="460" y2="340"/>
    <line x1="480" y1="280" x2="480" y2="340"/>
    <line x1="520" y1="280" x2="520" y2="340"/>
  </g>
  
  <!-- Piezo Array -->
  <rect x="340" y="340" width="200" height="60" fill="#2d3748" stroke="#ecc94b" stroke-width="2" rx="5"/>
  <text x="440" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" font-weight="bold">PIEZO ARRAY</text>
  <text x="440" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ecc94b">8× PZT-5H Actuators</text>
  
  <!-- Piezo elements -->
  <g fill="#ecc94b">
    <rect x="355" y="345" width="15" height="8"/>
    <rect x="378" y="345" width="15" height="8"/>
    <rect x="401" y="345" width="15" height="8"/>
    <rect x="424" y="345" width="15" height="8"/>
    <rect x="447" y="345" width="15" height="8"/>
    <rect x="470" y="345" width="15" height="8"/>
    <rect x="493" y="345" width="15" height="8"/>
    <rect x="516" y="345" width="15" height="8"/>
  </g>
  
  <!-- Piezo to Core -->
  <line x1="440" y1="400" x2="440" y2="450" stroke="#ecc94b" stroke-width="2"/>
  
  <!-- Metamaterial Core -->
  <rect x="360" y="450" width="160" height="70" fill="#553c9a" stroke="#805ad5" stroke-width="2" rx="5"/>
  <text x="440" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" font-weight="bold">METAMATERIAL</text>
  <text x="440" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#805ad5">CORE</text>
  <text x="440" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#d6bcfa">∇α Gradient</text>
  
  <!-- Thrust output arrow -->
  <line x1="520" y1="485" x2="580" y2="485" stroke="#48bb78" stroke-width="2"/>
  <polygon points="580,485 570,480 570,490" fill="#48bb78"/>
  <text x="620" y="490" font-family="Arial, sans-serif" font-size="11" fill="#48bb78" font-weight="bold">THRUST</text>
  
  <!-- Sensors Section -->
  <rect x="620" y="200" width="250" height="180" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="5"/>
  <text x="745" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" font-weight="bold">SENSOR ARRAY</text>
  
  <!-- Temperature sensors -->
  <rect x="640" y="240" width="100" height="40" fill="#1a202c" stroke="#38a169" stroke-width="1" rx="3"/>
  <text x="690" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">TEMPERATURE</text>
  <text x="690" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#38a169">4× PT1000 RTD</text>
  
  <!-- Accelerometer -->
  <rect x="760" y="240" width="90" height="40" fill="#1a202c" stroke="#4299e1" stroke-width="1" rx="3"/>
  <text x="805" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">ACCEL</text>
  <text x="805" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4299e1">ADXL355 6DOF</text>
  
  <!-- Torsion balance -->
  <rect x="640" y="295" width="100" height="40" fill="#1a202c" stroke="#f6ad55" stroke-width="1" rx="3"/>
  <text x="690" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">THRUST</text>
  <text x="690" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f6ad55">Torsion Balance</text>
  
  <!-- USB/UART -->
  <rect x="760" y="295" width="90" height="40" fill="#1a202c" stroke="#a0aec0" stroke-width="1" rx="3"/>
  <text x="805" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">INTERFACE</text>
  <text x="805" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a0aec0">USB / UART</text>
  
  <!-- Sensor lines to MCU -->
  <line x1="620" y1="260" x2="500" y2="80" stroke="#38a169" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="620" y1="315" x2="500" y2="90" stroke="#f6ad55" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Safety indicators -->
  <rect x="640" y="345" width="210" height="30" fill="#c53030" stroke="#f56565" stroke-width="1" rx="3"/>
  <text x="745" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">⚠ E-STOP: CUTS ALL POWER</text>
  
  <!-- Control Interface Box -->
  <rect x="30" y="180" width="140" height="120" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="5"/>
  <text x="100" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" font-weight="bold">CONTROL</text>
  <text x="100" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" font-weight="bold">CONTROL</text>
  
  <text x="40" y="230" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">Mode:</text>
  <text x="85" y="230" font-family="Arial, sans-serif" font-size="9" fill="#48bb78">TPH/OMV/Hybrid</text>
  
  <text x="40" y="250" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">Freq:</text>
  <text x="85" y="250" font-family="Arial, sans-serif" font-size="9" fill="#4299e1">100Hz - 50kHz</text>
  
  <text x="40" y="270" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">Voltage:</text>
  <text x="85" y="270" font-family="Arial, sans-serif" font-size="9" fill="#ed8936">0 - 200V</text>
  
  <text x="40" y="290" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">Phase:</text>
  <text x="85" y="290" font-family="Arial, sans-serif" font-size="9" fill="#9f7aea">8-ch independent</text>
  
  <!-- Legend -->
  <rect x="30" y="450" width="200" height="120" fill="#2d3748" stroke="#4a5568" stroke-width="1" rx="5"/>
  <text x="130" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" font-weight="bold">LEGEND</text>
  
  <line x1="45" y1="495" x2="75" y2="495" stroke="#48bb78" stroke-width="2"/>
  <text x="85" y="499" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">5V Power</text>
  
  <line x1="45" y1="515" x2="75" y2="515" stroke="#ed8936" stroke-width="2"/>
  <text x="85" y="519" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">200V HV</text>
  
  <line x1="45" y1="535" x2="75" y2="535" stroke="#4299e1" stroke-width="2"/>
  <text x="85" y="539" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">Digital (SPI)</text>
  
  <line x1="45" y1="555" x2="75" y2="555" stroke="#9f7aea" stroke-width="2"/>
  <text x="85" y="559" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">Analog Signal</text>
  
  <!-- Footer -->
  <text x="450" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#718096">AETHERION MARK 1 | Electrical Schematic | Rev 1.0</text>
</svg>
