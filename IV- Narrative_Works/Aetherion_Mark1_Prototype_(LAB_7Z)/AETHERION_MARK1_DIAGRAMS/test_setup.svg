<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800">
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4299e1;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#63b3ed;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#4299e1;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="metalGradT" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a5568"/>
      <stop offset="50%" style="stop-color:#718096"/>
      <stop offset="100%" style="stop-color:#4a5568"/>
    </linearGradient>
    <linearGradient id="tableGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748"/>
      <stop offset="100%" style="stop-color:#1a202c"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1100" height="800" fill="#1a202c"/>
  
  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#e2e8f0">AETHERION MARK 1 - TEST SETUP</text>
  <text x="550" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a0aec0">Torsion Balance + Vacuum Chamber Configuration</text>
  
  <!-- Main Test Chamber Area -->
  <rect x="50" y="80" width="650" height="530" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="10"/>
  <text x="375" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0">TEST CHAMBER</text>
  
  <!-- Isolation Table -->
  <rect x="100" y="520" width="550" height="30" fill="url(#tableGrad)" stroke="#4a5568" stroke-width="2"/>
  <text x="375" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0">PNEUMATIC ISOLATION TABLE</text>
  
  <!-- Table Legs -->
  <rect x="120" y="550" width="30" height="50" fill="#4a5568"/>
  <rect x="280" y="550" width="30" height="50" fill="#4a5568"/>
  <rect x="440" y="550" width="30" height="50" fill="#4a5568"/>
  <rect x="600" y="550" width="30" height="50" fill="#4a5568"/>
  
  <!-- Air springs -->
  <ellipse cx="135" cy="555" rx="12" ry="5" fill="#48bb78"/>
  <ellipse cx="295" cy="555" rx="12" ry="5" fill="#48bb78"/>
  <ellipse cx="455" cy="555" rx="12" ry="5" fill="#48bb78"/>
  <ellipse cx="615" cy="555" rx="12" ry="5" fill="#48bb78"/>
  
  <!-- Vacuum Chamber Base Plate -->
  <rect x="180" y="470" width="390" height="40" fill="url(#metalGradT)" stroke="#2d3748" stroke-width="2"/>
  <text x="375" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">VACUUM BASEPLATE (Stainless Steel)</text>
  
  <!-- Vacuum Chamber Bell Jar -->
  <path d="M200 470 
           Q200 200, 375 180 
           Q550 200, 550 470" 
        fill="url(#glassGrad)" stroke="#63b3ed" stroke-width="3"/>
  <text x="375" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#63b3ed">BOROSILICATE BELL JAR</text>
  <text x="375" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4299e1">12" diameter, 10⁻³ to 10⁻⁶ Torr</text>
  
  <!-- Polycarbonate Blast Shield (inside) -->
  <path d="M230 460 
           Q230 240, 375 225 
           Q520 240, 520 460" 
        fill="none" stroke="#ecc94b" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="280" y="250" font-family="Arial, sans-serif" font-size="8" fill="#ecc94b">POLYCARBONATE</text>
  <text x="280" y="262" font-family="Arial, sans-serif" font-size="8" fill="#ecc94b">BLAST SHIELD</text>
  
  <!-- Torsion Balance Frame -->
  <rect x="270" y="280" width="210" height="180" fill="none" stroke="#718096" stroke-width="2"/>
  
  <!-- Balance Support Posts -->
  <rect x="275" y="280" width="10" height="180" fill="#4a5568"/>
  <rect x="465" y="280" width="10" height="180" fill="#4a5568"/>
  
  <!-- Torsion Fiber Support -->
  <rect x="340" y="275" width="70" height="15" fill="#718096" stroke="#4a5568" stroke-width="1"/>
  <text x="375" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">FIBER MOUNT</text>
  
  <!-- Torsion Fiber -->
  <line x1="375" y1="290" x2="375" y2="340" stroke="#ed8936" stroke-width="1"/>
  <text x="395" y="315" font-family="Arial, sans-serif" font-size="7" fill="#ed8936">Tungsten</text>
  <text x="395" y="325" font-family="Arial, sans-serif" font-size="7" fill="#ed8936">Fiber 25µm</text>
  
  <!-- Balance Arm -->
  <rect x="300" y="340" width="150" height="8" fill="#718096" stroke="#4a5568" stroke-width="1"/>
  
  <!-- Counterweight -->
  <rect x="300" y="335" width="25" height="18" fill="#4a5568" stroke="#2d3748" stroke-width="1"/>
  <text x="312" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#a0aec0">CW</text>
  
  <!-- Sorbothane Pads -->
  <rect x="405" y="348" width="40" height="8" fill="#48bb78"/>
  <text x="425" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#48bb78">Sorbothane</text>
  
  <!-- AETHERION UNIT -->
  <g transform="translate(405, 356)">
    <!-- Housing -->
    <rect x="0" y="0" width="40" height="55" fill="#553c9a" stroke="#805ad5" stroke-width="2"/>
    <!-- Nozzle -->
    <path d="M10 0 L20 -15 L30 0" fill="#3182ce" stroke="#2b6cb0" stroke-width="1"/>
    <!-- Thrust arrow -->
    <line x1="20" y1="-20" x2="20" y2="-40" stroke="#48bb78" stroke-width="2"/>
    <polygon points="20,-45 15,-35 25,-35" fill="#48bb78"/>
    <!-- Core glow -->
    <rect x="8" y="20" width="24" height="15" fill="#9f7aea" opacity="0.5" filter="url(#glow3)"/>
  </g>
  <text x="425" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#805ad5" font-weight="bold">AETHERION MK1</text>
  <text x="425" y="437" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#d6bcfa">Thrust Axis ↑</text>
  
  <!-- Optical Displacement Sensor -->
  <rect x="480" y="330" width="60" height="40" fill="#276749" stroke="#48bb78" stroke-width="2"/>
  <text x="510" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">OPTICAL</text>
  <text x="510" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">SENSOR</text>
  <text x="510" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#48bb78">Keyence LK-G</text>
  
  <!-- Laser beam -->
  <line x1="480" y1="350" x2="450" y2="350" stroke="#f56565" stroke-width="2" stroke-dasharray="3,2"/>
  <circle cx="450" cy="350" r="3" fill="#f56565"/>
  
  <!-- Mirror on balance arm -->
  <rect x="445" y="342" width="5" height="12" fill="#e2e8f0"/>
  
  <!-- Vacuum Feedthrough -->
  <rect x="545" y="440" width="30" height="50" fill="#4a5568" stroke="#2d3748" stroke-width="1"/>
  <text x="560" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#a0aec0">ELECTRICAL</text>
  <text x="560" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#a0aec0">FEEDTHROUGH</text>
  
  <!-- Cables from feedthrough -->
  <path d="M575 460 Q600 460, 620 440 Q640 420, 660 420" stroke="#ed8936" stroke-width="2" fill="none"/>
  <path d="M575 470 Q605 470, 630 450 Q655 430, 680 430" stroke="#4299e1" stroke-width="2" fill="none"/>
  <path d="M575 480 Q610 480, 640 460 Q670 440, 700 440" stroke="#48bb78" stroke-width="2" fill="none"/>
  
  <!-- Vacuum Pump Connection -->
  <rect x="175" y="440" width="30" height="50" fill="#4a5568" stroke="#2d3748" stroke-width="1"/>
  <text x="190" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#a0aec0">VACUUM</text>
  <text x="190" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#a0aec0">PORT</text>
  
  <!-- Vacuum line -->
  <path d="M175 470 L120 470 L120 500 L80 500" stroke="#718096" stroke-width="4" fill="none"/>
  
  <!-- Pressure Gauge -->
  <circle cx="150" cy="470" r="15" fill="#2d3748" stroke="#4a5568" stroke-width="2"/>
  <text x="150" y="473" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#48bb78">PIRANI</text>
  
  <!-- Control Room Area -->
  <rect x="720" y="80" width="350" height="350" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="10"/>
  <text x="895" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0">CONTROL BOOTH (ISOLATED)</text>
  
  <!-- Control Computer -->
  <rect x="750" y="130" width="120" height="80" fill="#1a202c" stroke="#4a5568" stroke-width="2"/>
  <rect x="760" y="140" width="100" height="60" fill="#276749"/>
  <text x="810" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#48bb78">DATA LOGGER</text>
  <text x="870" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a0aec0">data_logger.py</text>
  
  <!-- Oscilloscope -->
  <rect x="890" y="130" width="80" height="60" fill="#1a202c" stroke="#4a5568" stroke-width="2"/>
  <rect x="898" y="138" width="64" height="40" fill="#2b6cb0"/>
  <path d="M905 158 Q920 148, 935 158 Q950 168, 955 158" stroke="#48bb78" stroke-width="2" fill="none"/>
  <text x="930" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a0aec0">OSCILLOSCOPE</text>
  
  <!-- UART/USB Connection -->
  <rect x="750" y="240" width="100" height="40" fill="#1a202c" stroke="#4299e1" stroke-width="2"/>
  <text x="800" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">USB-UART</text>
  <text x="800" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4299e1">FT232RL</text>
  
  <!-- Thermal Camera Monitor -->
  <rect x="870" y="240" width="80" height="60" fill="#1a202c" stroke="#ed8936" stroke-width="2"/>
  <rect x="878" y="248" width="64" height="40" fill="#742a2a"/>
  <text x="910" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ed8936">THERMAL</text>
  <text x="910" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a0aec0">FLIR E8-XT</text>
  
  <!-- E-Stop Button -->
  <circle cx="780" cy="350" r="25" fill="#c53030" stroke="#f56565" stroke-width="3"/>
  <text x="780" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">E-STOP</text>
  <text x="780" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f56565">REMOTE</text>
  
  <!-- HV Power Supply -->
  <rect x="850" y="330" width="100" height="50" fill="#1a202c" stroke="#ed8936" stroke-width="2"/>
  <text x="900" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">HV SUPPLY</text>
  <text x="900" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ed8936">24V → 200V</text>
  <text x="900" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#a0aec0">XP Power JCK</text>
  
  <!-- Connection lines from control to chamber -->
  <path d="M750 260 L700 260 L700 430 L660 430" stroke="#4299e1" stroke-width="2" fill="none"/>
  <text x="705" y="350" font-family="Arial, sans-serif" font-size="7" fill="#4299e1" transform="rotate(-90, 705, 350)">USB Data</text>
  
  <path d="M850 355 L820 355 L700 420 L660 420" stroke="#ed8936" stroke-width="2" fill="none"/>
  <text x="760" y="400" font-family="Arial, sans-serif" font-size="7" fill="#ed8936">200V HV</text>
  
  <!-- Vacuum Pump System -->
  <rect x="30" y="630" width="250" height="140" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="10"/>
  <text x="155" y="655" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">VACUUM SYSTEM</text>
  
  <!-- Roughing Pump -->
  <rect x="50" y="680" width="80" height="50" fill="#1a202c" stroke="#718096" stroke-width="2"/>
  <text x="90" y="700" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">ROUGHING</text>
  <text x="90" y="712" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">PUMP</text>
  <text x="90" y="725" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#a0aec0">Edwards RV5</text>
  
  <!-- Turbo Pump -->
  <rect x="150" y="680" width="80" height="50" fill="#1a202c" stroke="#718096" stroke-width="2"/>
  <text x="190" y="700" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">TURBO</text>
  <text x="190" y="712" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">PUMP</text>
  <text x="190" y="725" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#a0aec0">(High Vacuum)</text>
  
  <!-- Pump connection -->
  <line x1="80" y1="500" x2="80" y2="630" stroke="#718096" stroke-width="4"/>
  <line x1="80" y1="630" x2="90" y2="680" stroke="#718096" stroke-width="4"/>
  
  <!-- Safety Equipment -->
  <rect x="310" y="630" width="180" height="140" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="10"/>
  <text x="400" y="655" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">SAFETY EQUIPMENT</text>
  
  <!-- Hearing protection -->
  <rect x="325" y="675" width="60" height="35" fill="#1a202c" stroke="#48bb78" stroke-width="1"/>
  <text x="355" y="697" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#48bb78">HEARING</text>
  <text x="355" y="707" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#48bb78">NRR 30+</text>
  
  <!-- Fire extinguisher -->
  <rect x="400" y="675" width="60" height="35" fill="#1a202c" stroke="#f56565" stroke-width="1"/>
  <text x="430" y="697" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f56565">CO2 FIRE</text>
  <text x="430" y="707" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f56565">EXTINGUISHER</text>
  
  <!-- HV Discharge probe -->
  <rect x="325" y="720" width="60" height="35" fill="#1a202c" stroke="#ed8936" stroke-width="1"/>
  <text x="355" y="742" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#ed8936">HV DISCHARGE</text>
  <text x="355" y="752" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#ed8936">PROBE</text>
  
  <!-- First aid -->
  <rect x="400" y="720" width="60" height="35" fill="#1a202c" stroke="#48bb78" stroke-width="1"/>
  <text x="430" y="742" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#48bb78">FIRST AID</text>
  <text x="430" y="752" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#48bb78">KIT</text>
  
  <!-- Data Acquisition -->
  <rect x="720" y="450" width="350" height="130" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="10"/>
  <text x="895" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">DATA ACQUISITION</text>
  
  <!-- NI DAQ -->
  <rect x="740" y="495" width="100" height="50" fill="#1a202c" stroke="#4299e1" stroke-width="2"/>
  <text x="790" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">NI USB-6009</text>
  <text x="790" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#4299e1">12-bit ADC</text>
  <text x="790" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#a0aec0">8 AI, 2 AO</text>
  
  <!-- Signal list -->
  <rect x="860" y="495" width="180" height="75" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  <text x="950" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" font-weight="bold">CHANNELS:</text>
  <text x="870" y="525" font-family="Arial, sans-serif" font-size="7" fill="#48bb78">CH1: Balance Position</text>
  <text x="870" y="537" font-family="Arial, sans-serif" font-size="7" fill="#ed8936">CH2-5: Piezo Temps (4x)</text>
  <text x="870" y="549" font-family="Arial, sans-serif" font-size="7" fill="#4299e1">CH6-8: Accelerometer XYZ</text>
  <text x="870" y="561" font-family="Arial, sans-serif" font-size="7" fill="#a0aec0">CH9: Chamber Pressure</text>
  
  <!-- Legend -->
  <rect x="520" y="630" width="180" height="140" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="10"/>
  <text x="610" y="655" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">LEGEND</text>
  
  <line x1="535" y1="675" x2="565" y2="675" stroke="#4299e1" stroke-width="2"/>
  <text x="575" y="679" font-family="Arial, sans-serif" font-size="8" fill="#a0aec0">USB/Data</text>
  
  <line x1="535" y1="695" x2="565" y2="695" stroke="#ed8936" stroke-width="2"/>
  <text x="575" y="699" font-family="Arial, sans-serif" font-size="8" fill="#a0aec0">HV Power</text>
  
  <line x1="535" y1="715" x2="565" y2="715" stroke="#48bb78" stroke-width="2"/>
  <text x="575" y="719" font-family="Arial, sans-serif" font-size="8" fill="#a0aec0">Sensor Signal</text>
  
  <line x1="535" y1="735" x2="565" y2="735" stroke="#718096" stroke-width="4"/>
  <text x="575" y="739" font-family="Arial, sans-serif" font-size="8" fill="#a0aec0">Vacuum Line</text>
  
  <rect x="535" y="750" width="30" height="10" fill="url(#glassGrad)" stroke="#63b3ed" stroke-width="1"/>
  <text x="575" y="759" font-family="Arial, sans-serif" font-size="8" fill="#a0aec0">Glass/Vacuum</text>
  
  <!-- Warning box -->
  <rect x="720" y="590" width="350" height="35" fill="#742a2a" stroke="#f56565" stroke-width="2" rx="5"/>
  <text x="895" y="612" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#feb2b2">⚠ NO PERSONNEL IN TEST CHAMBER DURING FIRING</text>
  
  <!-- Footer -->
  <text x="550" y="785" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#718096">AETHERION MARK 1 | Test Setup Diagram | Rev 1.0 | ATP-MK1-001</text>
</svg>
