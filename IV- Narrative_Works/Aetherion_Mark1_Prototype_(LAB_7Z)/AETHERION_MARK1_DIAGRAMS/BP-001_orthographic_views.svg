    <rect x="-45" y="50" width="25" height="15" fill="none" stroke="#a0aec0" stroke-width="0.5"/>
    <rect x="-15" y="50" width="20" height="15" fill="none" stroke="#a0aec0" stroke-width="0.5"/>
    <rect x="10" y="50" width="30" height="15" fill="none" stroke="#a0aec0" stroke-width="0.5"/>
    
