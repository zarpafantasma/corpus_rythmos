    <rect x="-70" y="155" width="140" height="15" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="-50" cy="162" r="4" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="0" cy="162" r="4" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="50" cy="162" r="4" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Section line A-A -->
