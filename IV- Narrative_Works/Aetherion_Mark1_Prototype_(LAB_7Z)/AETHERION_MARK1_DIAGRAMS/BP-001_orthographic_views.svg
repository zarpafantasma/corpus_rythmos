    <rect x="-30" y="12" width="10" height="11" fill="none" stroke="#ecc94b" stroke-width="0.5"/>
    <rect x="-18" y="12" width="10" height="11" fill="none" stroke="#ecc94b" stroke-width="0.5"/>
    <rect x="-6" y="12" width="10" height="11" fill="none" stroke="#ecc94b" stroke-width="0.5"/>
    <rect x="6" y="12" width="10" height="11" fill="none" stroke="#ecc94b" stroke-width="0.5"/>
    <rect x="18" y="12" width="10" height="11" fill="none" stroke="#ecc94b" stroke-width="0.5"/>
    <rect x="30" y="12" width="10" height="11" fill="none" stroke="#ecc94b" stroke-width="0.5"/>
    
    <!-- Base reflector -->
