      <line x1="-60" y1="-110" x2="-50" y2="-100"/>
      <line x1="-60" y1="-100" x2="-50" y2="-90"/>
      <line x1="-60" y1="-90" x2="-50" y2="-80"/>
      <line x1="-60" y1="-80" x2="-50" y2="-70"/>
      <line x1="-60" y1="-70" x2="-50" y2="-60"/>
      <line x1="-60" y1="-60" x2="-50" y2="-50"/>
      <line x1="-60" y1="-50" x2="-50" y2="-40"/>
      <line x1="-60" y1="-40" x2="-50" y2="-30"/>
      <line x1="-60" y1="-30" x2="-50" y2="-20"/>
      <line x1="-60" y1="-20" x2="-50" y2="-10"/>
      <line x1="-60" y1="-10" x2="-50" y2="0"/>
      <line x1="-60" y1="0" x2="-50" y2="10"/>
    </g>
    
    <!-- Housing wall hatching (right) -->
    <g stroke="#4a6fa5" stroke-width="0.3">
      <line x1="50" y1="-120" x2="60" y2="-110"/>
      <line x1="50" y1="-110" x2="60" y2="-100"/>
      <line x1="50" y1="-100" x2="60" y2="-90"/>
      <line x1="50" y1="-90" x2="60" y2="-80"/>
      <line x1="50" y1="-80" x2="60" y2="-70"/>
      <line x1="50" y1="-70" x2="60" y2="-60"/>
      <line x1="50" y1="-60" x2="60" y2="-50"/>
      <line x1="50" y1="-50" x2="60" y2="-40"/>
      <line x1="50" y1="-40" x2="60" y2="-30"/>
      <line x1="50" y1="-30" x2="60" y2="-20"/>
      <line x1="50" y1="-20" x2="60" y2="-10"/>
      <line x1="50" y1="-10" x2="60" y2="0"/>
      <line x1="50" y1="0" x2="60" y2="10"/>
    </g>
    
    <!-- Nozzle section -->
    <path d="M-45,-115 L-25,-90 L25,-90 L45,-115" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <path d="M-45,-115 L-25,-90" fill="none" stroke="#63b3ed" stroke-width="0.5"/>
    
    <!-- Gradient zone -->
    <rect x="-40" y="-85" width="80" height="60" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Layer lines -->
    <g stroke="#4a6fa5" stroke-width="0.3">
      <line x1="-40" y1="-81" x2="40" y2="-81"/>
      <line x1="-40" y1="-77" x2="40" y2="-77"/>
      <line x1="-40" y1="-73" x2="40" y2="-73"/>
      <line x1="-40" y1="-69" x2="40" y2="-69"/>
      <line x1="-40" y1="-65" x2="40" y2="-65"/>
      <line x1="-40" y1="-61" x2="40" y2="-61"/>
      <line x1="-40" y1="-57" x2="40" y2="-57"/>
      <line x1="-40" y1="-53" x2="40" y2="-53"/>
      <line x1="-40" y1="-49" x2="40" y2="-49"/>
      <line x1="-40" y1="-45" x2="40" y2="-45"/>
      <line x1="-40" y1="-41" x2="40" y2="-41"/>
      <line x1="-40" y1="-37" x2="40" y2="-37"/>
      <line x1="-40" y1="-33" x2="40" y2="-33"/>
      <line x1="-40" y1="-29" x2="40" y2="-29"/>
    </g>
    
    <!-- Accumulator -->
