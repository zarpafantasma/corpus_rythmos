    <!-- Accumulator hatching -->
    <g stroke="#805ad5" stroke-width="0.3">
      <line x1="-40" y1="-25" x2="-10" y2="5"/>
      <line x1="-30" y1="-25" x2="0" y2="5"/>
      <line x1="-20" y1="-25" x2="10" y2="5"/>
      <line x1="-10" y1="-25" x2="20" y2="5"/>
      <line x1="0" y1="-25" x2="30" y2="5"/>
      <line x1="10" y1="-25" x2="40" y2="5"/>
      <line x1="20" y1="-25" x2="40" y2="-5"/>
      <line x1="30" y1="-25" x2="40" y2="-15"/>
