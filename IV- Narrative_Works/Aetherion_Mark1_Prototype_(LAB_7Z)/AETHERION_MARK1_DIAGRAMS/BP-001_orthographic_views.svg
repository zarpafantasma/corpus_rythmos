    <line x1="-55" y1="-165" x2="55" y2="-165" stroke="#a0aec0" stroke-width="0.5"/>
    
    <!-- Nozzle visible lines -->
    <line x1="-45" y1="-150" x2="-25" y2="-110" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="45" y1="-150" x2="25" y2="-110" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="-25" y1="-110" x2="25" y2="-110" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Core outline (hidden) -->
    <rect x="-40" y="-105" width="80" height="180" fill="none" stroke="#a0aec0" stroke-width="0.5" stroke-dasharray="5,3"/>
    
    <!-- Piezo ring -->
    <rect x="-50" y="80" width="100" height="20" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="-45" y1="85" x2="45" y2="85" stroke="#a0aec0" stroke-width="0.5"/>
    <line x1="-45" y1="95" x2="45" y2="95" stroke="#a0aec0" stroke-width="0.5"/>
    
    <!-- Electronics bay -->
    <rect x="-55" y="105" width="110" height="50" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="-40" y1="115" x2="-10" y2="115" stroke="#a0aec0" stroke-width="0.5"/>
    <rect x="-40" y="115" width="30" height="20" fill="none" stroke="#a0aec0" stroke-width="0.5"/>
    <rect x="10" y="115" width="25" height="20" fill="none" stroke="#a0aec0" stroke-width="0.5"/>
    
    <!-- Mounting flange -->
    <rect x="-70" y="155" width="140" height="15" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="-50" cy="162" r="4" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="0" cy="162" r="4" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="50" cy="162" r="4" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Dimensions -->
    <!-- Width 60mm (housing) -->
    <line x1="-60" y1="190" x2="-60" y2="200" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="60" y1="190" x2="60" y2="200" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="-60" y1="195" x2="60" y2="195" stroke="#e2e8f0" stroke-width="0.5" marker-start="url(#dimArrowL)" marker-end="url(#dimArrowR)"/>
    <text x="0" y="208" font-family="Courier New, monospace" font-size="9" fill="#e2e8f0" text-anchor="middle">60</text>
    
    <!-- Width 80mm (flange) -->
    <line x1="-70" y1="215" x2="-70" y2="225" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="70" y1="215" x2="70" y2="225" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="-70" y1="220" x2="70" y2="220" stroke="#e2e8f0" stroke-width="0.5" marker-start="url(#dimArrowL)" marker-end="url(#dimArrowR)"/>
    <text x="0" y="233" font-family="Courier New, monospace" font-size="9" fill="#e2e8f0" text-anchor="middle">80</text>
    
    <!-- Height 85mm -->
    <line x1="80" y1="-170" x2="95" y2="-170" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="80" y1="170" x2="95" y2="170" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="90" y1="-170" x2="90" y2="170" stroke="#e2e8f0" stroke-width="0.5" marker-start="url(#dimArrowL)" marker-end="url(#dimArrowR)"/>
    <text x="100" y="5" font-family="Courier New, monospace" font-size="9" fill="#e2e8f0" transform="rotate(90, 100, 5)">85</text>
  </g>
  
  <!-- ============== SIDE VIEW ============== -->
  <g transform="translate(550, 250)">
    <!-- Center line vertical -->
    <line x1="0" y1="-180" x2="0" y2="180" stroke="#f6ad55" stroke-width="0.5" stroke-dasharray="12,3,3,3"/>
    
    <!-- Outer housing -->
    <rect x="-60" y="-170" width="120" height="340" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
    
    <!-- Top cover -->
    <rect x="-60" y="-170" width="120" height="20" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
    
    <!-- Nozzle (side view - same as front) -->
    <line x1="-45" y1="-150" x2="-25" y2="-110" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="45" y1="-150" x2="25" y2="-110" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="-25" y1="-110" x2="25" y2="-110" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Core outline (hidden) -->
    <rect x="-40" y="-105" width="80" height="180" fill="none" stroke="#a0aec0" stroke-width="0.5" stroke-dasharray="5,3"/>
    
    <!-- Piezo ring -->
    <rect x="-50" y="80" width="100" height="20" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Electronics bay -->
    <rect x="-55" y="105" width="110" height="50" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    
