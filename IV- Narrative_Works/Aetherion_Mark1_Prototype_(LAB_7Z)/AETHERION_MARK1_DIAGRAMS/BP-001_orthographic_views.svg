    <!-- Center lines -->
    <line x1="-120" y1="0" x2="120" y2="0" stroke="#f6ad55" stroke-width="0.5" stroke-dasharray="12,3,3,3"/>
    <line x1="0" y1="-120" x2="0" y2="120" stroke="#f6ad55" stroke-width="0.5" stroke-dasharray="12,3,3,3"/>
    
    <!-- Outer housing (circle) -->
