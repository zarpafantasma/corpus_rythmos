<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <!-- Blueprint grid pattern -->
    <pattern id="gridSmall" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#1e3a5f" stroke-width="0.5"/>
    </pattern>
    <pattern id="gridLarge" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#gridSmall)"/>
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#2a4a6f" stroke-width="1"/>
    </pattern>
    <!-- Dimension arrow markers -->
    <marker id="dimArrowL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 8 6, 0 3" fill="#e2e8f0"/>
    </marker>
    <marker id="dimArrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 0 6, 8 3" fill="#e2e8f0"/>
    </marker>
    <!-- Center line pattern -->
    <pattern id="centerLine" patternUnits="userSpaceOnUse" width="20" height="1">
      <line x1="0" y1="0" x2="12" y2="0" stroke="#f6ad55" stroke-width="0.5"/>
      <line x1="14" y1="0" x2="18" y2="0" stroke="#f6ad55" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="900" fill="#0a1628"/>
  <rect width="1200" height="900" fill="url(#gridLarge)"/>
  
  <!-- Border frame -->
  <rect x="20" y="20" width="1160" height="860" fill="none" stroke="#4a6fa5" stroke-width="2"/>
  <rect x="25" y="25" width="1150" height="850" fill="none" stroke="#4a6fa5" stroke-width="1"/>
  
  <!-- Title block -->
  <rect x="850" y="780" width="320" height="90" fill="#0d2137" stroke="#4a6fa5" stroke-width="1"/>
  <line x1="850" y1="810" x2="1170" y2="810" stroke="#4a6fa5" stroke-width="1"/>
  <line x1="850" y1="840" x2="1170" y2="840" stroke="#4a6fa5" stroke-width="1"/>
  <line x1="1000" y1="810" x2="1000" y2="870" stroke="#4a6fa5" stroke-width="1"/>
  
  <text x="860" y="800" font-family="Courier New, monospace" font-size="12" fill="#e2e8f0">AETHERION MARK 1</text>
  <text x="860" y="828" font-family="Courier New, monospace" font-size="10" fill="#a0aec0">ORTHOGRAPHIC VIEWS</text>
  <text x="860" y="858" font-family="Courier New, monospace" font-size="9" fill="#a0aec0">SCALE: 2:1</text>
  <text x="1010" y="828" font-family="Courier New, monospace" font-size="9" fill="#a0aec0">DWG: ATP-MK1-BP-001</text>
  <text x="1010" y="858" font-family="Courier New, monospace" font-size="9" fill="#a0aec0">REV: 1.0</text>
  
  <!-- View labels -->
  <text x="200" y="60" font-family="Courier New, monospace" font-size="14" fill="#f6ad55" text-anchor="middle">FRONT VIEW</text>
  <text x="550" y="60" font-family="Courier New, monospace" font-size="14" fill="#f6ad55" text-anchor="middle">SIDE VIEW</text>
  <text x="900" y="60" font-family="Courier New, monospace" font-size="14" fill="#f6ad55" text-anchor="middle">TOP VIEW</text>
  <text x="550" y="470" font-family="Courier New, monospace" font-size="14" fill="#f6ad55" text-anchor="middle">SECTION A-A</text>
  
  <!-- ============== FRONT VIEW ============== -->
  <g transform="translate(200, 250)">
    <!-- Center line vertical -->
    <line x1="0" y1="-180" x2="0" y2="180" stroke="#f6ad55" stroke-width="0.5" stroke-dasharray="12,3,3,3"/>
    
    <!-- Outer housing -->
