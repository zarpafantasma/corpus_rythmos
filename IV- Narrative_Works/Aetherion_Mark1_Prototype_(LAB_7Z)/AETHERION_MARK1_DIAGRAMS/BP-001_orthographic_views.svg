    <line x1="70" y1="0" x2="90" y2="0" stroke="#48bb78" stroke-width="1.5"/>
    <text x="-95" y="5" font-family="Courier New, monospace" font-size="12" fill="#48bb78">A</text>
    <text x="95" y="5" font-family="Courier New, monospace" font-size="12" fill="#48bb78">A</text>
    <polygon points="-75,5 -75,-5 -85,0" fill="#48bb78"/>
    <polygon points="75,5 75,-5 85,0" fill="#48bb78"/>
    
    <!-- Detail dimensions -->
    <!-- Nozzle aperture 25mm -->
    <line x1="-25" y1="-110" x2="-25" y2="-125" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="25" y1="-110" x2="25" y2="-125" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="-25" y1="-120" x2="25" y2="-120" stroke="#e2e8f0" stroke-width="0.5" marker-start="url(#dimArrowL)" marker-end="url(#dimArrowR)"/>
    <text x="0" y="-128" font-family="Courier New, monospace" font-size="8" fill="#e2e8f0" text-anchor="middle">Ø25</text>
  </g>
  
  <!-- ============== TOP VIEW ============== -->
