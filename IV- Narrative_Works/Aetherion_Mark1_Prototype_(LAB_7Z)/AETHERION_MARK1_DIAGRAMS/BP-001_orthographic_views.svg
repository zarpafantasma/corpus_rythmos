    <!-- Nozzle aperture -->
    <circle cx="0" cy="0" r="25" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
    
    <!-- Nozzle cone (hidden lines) -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#a0aec0" stroke-width="0.5" stroke-dasharray="5,3"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#a0aec0" stroke-width="0.5" stroke-dasharray="5,3"/>
    
    <!-- Mounting holes (projected) -->
    <circle cx="-50" cy="0" r="4" fill="none" stroke="#a0aec0" stroke-width="0.5" stroke-dasharray="3,2"/>
    <circle cx="50" cy="0" r="4" fill="none" stroke="#a0aec0" stroke-width="0.5" stroke-dasharray="3,2"/>
    <circle cx="0" cy="-50" r="4" fill="none" stroke="#a0aec0" stroke-width="0.5" stroke-dasharray="3,2"/>
    <circle cx="0" cy="50" r="4" fill="none" stroke="#a0aec0" stroke-width="0.5" stroke-dasharray="3,2"/>
    
    <!-- Flange outline (hidden) -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#a0aec0" stroke-width="0.5" stroke-dasharray="5,3"/>
    
    <!-- Dimensions -->
    <!-- Outer diameter -->
    <line x1="60" y1="80" x2="60" y2="90" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="-60" y1="80" x2="-60" y2="90" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="-60" y1="85" x2="60" y2="85" stroke="#e2e8f0" stroke-width="0.5" marker-start="url(#dimArrowL)" marker-end="url(#dimArrowR)"/>
    <text x="0" y="98" font-family="Courier New, monospace" font-size="9" fill="#e2e8f0" text-anchor="middle">Ø60</text>
    
    <!-- Aperture diameter -->
    <line x1="20" y1="-20" x2="35" y2="-35" stroke="#e2e8f0" stroke-width="0.5"/>
    <text x="40" y="-35" font-family="Courier New, monospace" font-size="8" fill="#e2e8f0">Ø25</text>
  </g>
  
  <!-- ============== SECTION A-A ============== -->
