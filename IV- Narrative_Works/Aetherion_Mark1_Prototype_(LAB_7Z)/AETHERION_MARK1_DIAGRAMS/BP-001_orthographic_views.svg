  <!-- Notes -->
  <rect x="40" y="630" width="200" height="130" fill="#0d2137" stroke="#4a6fa5" stroke-width="1"/>
  <text x="50" y="650" font-family="Courier New, monospace" font-size="10" fill="#f6ad55">NOTES:</text>
  <text x="50" y="670" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">1. ALL DIMENSIONS IN MM</text>
  <text x="50" y="685" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">2. TOLERANCES: ±0.1 UNLESS NOTED</text>
  <text x="50" y="700" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">3. MATERIAL: AL 6061-T6 HOUSING</text>
  <text x="50" y="715" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">4. SURFACE FINISH: Ra 1.6 µm</text>
  <text x="50" y="730" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">5. BREAK ALL SHARP EDGES</text>
  <text x="50" y="745" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">6. REFER TO ATP-MK1-MTL-001</text>
  <text x="50" y="760" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">   FOR CORE SPECIFICATION</text>
  
  <!-- Scale bar -->
  <g transform="translate(40, 810)">
    <rect x="0" y="0" width="100" height="8" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="0" y="0" width="20" height="8" fill="#e2e8f0"/>
    <rect x="40" y="0" width="20" height="8" fill="#e2e8f0"/>
    <rect x="80" y="0" width="20" height="8" fill="#e2e8f0"/>
    <text x="0" y="20" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">0</text>
    <text x="50" y="20" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">25</text>
    <text x="100" y="20" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">50mm</text>
