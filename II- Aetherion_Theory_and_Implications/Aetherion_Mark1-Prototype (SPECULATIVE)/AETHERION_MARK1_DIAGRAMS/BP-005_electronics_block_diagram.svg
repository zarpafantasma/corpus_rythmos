<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <pattern id="gridSmall5" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#1e3a5f" stroke-width="0.5"/>
    </pattern>
    <pattern id="gridLarge5" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#gridSmall5)"/>
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#2a4a6f" stroke-width="1"/>
    </pattern>
    <marker id="sigArrow" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#48bb78"/>
    </marker>
    <marker id="pwrArrow" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#ed8936"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="900" fill="#0a1628"/>
  <rect width="1200" height="900" fill="url(#gridLarge5)"/>
  
  <!-- Border frame -->
  <rect x="20" y="20" width="1160" height="860" fill="none" stroke="#4a6fa5" stroke-width="2"/>
  <rect x="25" y="25" width="1150" height="850" fill="none" stroke="#4a6fa5" stroke-width="1"/>
  
  <!-- Title block -->
  <rect x="850" y="780" width="320" height="90" fill="#0d2137" stroke="#4a6fa5" stroke-width="1"/>
  <line x1="850" y1="810" x2="1170" y2="810" stroke="#4a6fa5" stroke-width="1"/>
  <line x1="850" y1="840" x2="1170" y2="840" stroke="#4a6fa5" stroke-width="1"/>
  <line x1="1000" y1="810" x2="1000" y2="870" stroke="#4a6fa5" stroke-width="1"/>
  
  <text x="860" y="800" font-family="Courier New, monospace" font-size="12" fill="#e2e8f0">AETHERION MARK 1</text>
  <text x="860" y="828" font-family="Courier New, monospace" font-size="10" fill="#a0aec0">ELECTRONICS BLOCK DIAGRAM</text>
  <text x="860" y="858" font-family="Courier New, monospace" font-size="9" fill="#a0aec0">SCALE: NTS</text>
  <text x="1010" y="828" font-family="Courier New, monospace" font-size="9" fill="#a0aec0">DWG: ATP-MK1-BP-005</text>
  <text x="1010" y="858" font-family="Courier New, monospace" font-size="9" fill="#a0aec0">REV: 1.0</text>
  
  <!-- Main title -->
  <text x="550" y="55" font-family="Courier New, monospace" font-size="16" fill="#f6ad55" text-anchor="middle">ELECTRONICS SYSTEM BLOCK DIAGRAM</text>
  
  <!-- ============== POWER INPUT ============== -->
  <g transform="translate(100, 200)">
    <rect x="-60" y="-40" width="120" height="80" fill="#0d2137" stroke="#ed8936" stroke-width="2"/>
    <text x="0" y="-15" font-family="Courier New, monospace" font-size="11" fill="#ed8936" text-anchor="middle">24V DC</text>
    <text x="0" y="5" font-family="Courier New, monospace" font-size="11" fill="#ed8936" text-anchor="middle">INPUT</text>
    <text x="0" y="25" font-family="Courier New, monospace" font-size="9" fill="#a0aec0" text-anchor="middle">5A / 120W</text>
    
    <!-- Connector symbol -->
    <circle cx="0" cy="-55" r="8" fill="none" stroke="#ed8936" stroke-width="2"/>
    <line x1="0" y1="-63" x2="0" y2="-47" stroke="#ed8936" stroke-width="2"/>
  </g>
  
  <!-- ============== 5V REGULATOR ============== -->
  <g transform="translate(280, 150)">
    <rect x="-50" y="-30" width="100" height="60" fill="#0d2137" stroke="#48bb78" stroke-width="2"/>
    <text x="0" y="-5" font-family="Courier New, monospace" font-size="10" fill="#48bb78" text-anchor="middle">LM7805</text>
    <text x="0" y="12" font-family="Courier New, monospace" font-size="9" fill="#a0aec0" text-anchor="middle">5V / 1.5A</text>
  </g>
  
  <!-- ============== HV CONVERTER ============== -->
  <g transform="translate(280, 280)">
    <rect x="-50" y="-40" width="100" height="80" fill="#0d2137" stroke="#f56565" stroke-width="2"/>
    <text x="0" y="-15" font-family="Courier New, monospace" font-size="10" fill="#f56565" text-anchor="middle">DC-DC</text>
    <text x="0" y="2" font-family="Courier New, monospace" font-size="10" fill="#f56565" text-anchor="middle">HV CONV</text>
    <text x="0" y="22" font-family="Courier New, monospace" font-size="9" fill="#a0aec0" text-anchor="middle">24V→200V</text>
    <text x="0" y="35" font-family="Courier New, monospace" font-size="8" fill="#a0aec0" text-anchor="middle">XP JCK2024</text>
  </g>
  
  <!-- Power connections from input -->
  <line x1="160" y1="180" x2="230" y2="150" stroke="#ed8936" stroke-width="2" marker-end="url(#pwrArrow)"/>
  <line x1="160" y1="220" x2="230" y2="280" stroke="#ed8936" stroke-width="2" marker-end="url(#pwrArrow)"/>
  <text x="185" y="145" font-family="Courier New, monospace" font-size="8" fill="#ed8936">24V</text>
  <text x="185" y="270" font-family="Courier New, monospace" font-size="8" fill="#ed8936">24V</text>
  
  <!-- ============== MCU ============== -->
  <g transform="translate(500, 200)">
    <rect x="-80" y="-70" width="160" height="140" fill="#0d2137" stroke="#4299e1" stroke-width="2"/>
    <text x="0" y="-45" font-family="Courier New, monospace" font-size="12" fill="#4299e1" text-anchor="middle">STM32H743</text>
    <text x="0" y="-28" font-family="Courier New, monospace" font-size="9" fill="#a0aec0" text-anchor="middle">480 MHz ARM</text>
    
    <!-- Pins -->
    <text x="-70" y="-5" font-family="Courier New, monospace" font-size="7" fill="#48bb78">SPI1</text>
    <text x="-70" y="10" font-family="Courier New, monospace" font-size="7" fill="#48bb78">SPI2</text>
    <text x="-70" y="25" font-family="Courier New, monospace" font-size="7" fill="#48bb78">ADC1</text>
    <text x="-70" y="40" font-family="Courier New, monospace" font-size="7" fill="#48bb78">GPIO</text>
    <text x="-70" y="55" font-family="Courier New, monospace" font-size="7" fill="#ecc94b">UART3</text>
    
    <text x="70" y="-5" font-family="Courier New, monospace" font-size="7" fill="#48bb78" text-anchor="end">TIM2</text>
    <text x="70" y="10" font-family="Courier New, monospace" font-size="7" fill="#48bb78" text-anchor="end">TIM3</text>
    <text x="70" y="25" font-family="Courier New, monospace" font-size="7" fill="#48bb78" text-anchor="end">DAC</text>
    <text x="70" y="40" font-family="Courier New, monospace" font-size="7" fill="#f56565" text-anchor="end">EXTI</text>
  </g>
  
  <!-- 5V to MCU -->
  <line x1="330" y1="150" x2="420" y2="150" stroke="#48bb78" stroke-width="2" marker-end="url(#sigArrow)"/>
  <text x="375" y="143" font-family="Courier New, monospace" font-size="8" fill="#48bb78">5V</text>
  
  <!-- ============== DDS ============== -->
  <g transform="translate(700, 150)">
    <rect x="-60" y="-40" width="120" height="80" fill="#0d2137" stroke="#805ad5" stroke-width="2"/>
    <text x="0" y="-15" font-family="Courier New, monospace" font-size="11" fill="#805ad5" text-anchor="middle">AD9910</text>
    <text x="0" y="5" font-family="Courier New, monospace" font-size="10" fill="#805ad5" text-anchor="middle">DDS</text>
    <text x="0" y="22" font-family="Courier New, monospace" font-size="8" fill="#a0aec0" text-anchor="middle">1 GSPS 14-bit</text>
  </g>
  
  <!-- MCU to DDS -->
  <line x1="580" y1="180" x2="640" y2="150" stroke="#48bb78" stroke-width="1.5" marker-end="url(#sigArrow)"/>
  <text x="600" y="155" font-family="Courier New, monospace" font-size="7" fill="#48bb78">SPI1</text>
  
  <!-- ============== DAC ============== -->
  <g transform="translate(700, 280)">
    <rect x="-60" y="-35" width="120" height="70" fill="#0d2137" stroke="#38a169" stroke-width="2"/>
    <text x="0" y="-10" font-family="Courier New, monospace" font-size="11" fill="#38a169" text-anchor="middle">AD5764</text>
    <text x="0" y="8" font-family="Courier New, monospace" font-size="10" fill="#38a169" text-anchor="middle">QUAD DAC</text>
    <text x="0" y="25" font-family="Courier New, monospace" font-size="8" fill="#a0aec0" text-anchor="middle">16-bit ±10V</text>
  </g>
  
  <!-- MCU to DAC -->
  <line x1="580" y1="220" x2="640" y2="260" stroke="#48bb78" stroke-width="1.5" marker-end="url(#sigArrow)"/>
  <text x="600" y="250" font-family="Courier New, monospace" font-size="7" fill="#48bb78">SPI2</text>
  
  <!-- ============== HV AMPLIFIERS ============== -->
  <g transform="translate(920, 220)">
    <rect x="-80" y="-90" width="160" height="180" fill="#0d2137" stroke="#ed8936" stroke-width="2"/>
    <text x="0" y="-65" font-family="Courier New, monospace" font-size="11" fill="#ed8936" text-anchor="middle">PA94 × 8</text>
    <text x="0" y="-48" font-family="Courier New, monospace" font-size="9" fill="#a0aec0" text-anchor="middle">HV AMPLIFIERS</text>
    
    <!-- 8 channel indicators -->
    <g transform="translate(-60, -30)">
      <rect x="0" y="0" width="25" height="20" fill="none" stroke="#ecc94b" stroke-width="1"/>
      <text x="12" y="14" font-family="Courier New, monospace" font-size="7" fill="#ecc94b" text-anchor="middle">CH1</text>
      
      <rect x="30" y="0" width="25" height="20" fill="none" stroke="#ecc94b" stroke-width="1"/>
      <text x="42" y="14" font-family="Courier New, monospace" font-size="7" fill="#ecc94b" text-anchor="middle">CH2</text>
      
      <rect x="60" y="0" width="25" height="20" fill="none" stroke="#ecc94b" stroke-width="1"/>
      <text x="72" y="14" font-family="Courier New, monospace" font-size="7" fill="#ecc94b" text-anchor="middle">CH3</text>
      
      <rect x="90" y="0" width="25" height="20" fill="none" stroke="#ecc94b" stroke-width="1"/>
      <text x="102" y="14" font-family="Courier New, monospace" font-size="7" fill="#ecc94b" text-anchor="middle">CH4</text>
      
      <rect x="0" y="30" width="25" height="20" fill="none" stroke="#ecc94b" stroke-width="1"/>
      <text x="12" y="44" font-family="Courier New, monospace" font-size="7" fill="#ecc94b" text-anchor="middle">CH5</text>
      
      <rect x="30" y="30" width="25" height="20" fill="none" stroke="#ecc94b" stroke-width="1"/>
      <text x="42" y="44" font-family="Courier New, monospace" font-size="7" fill="#ecc94b" text-anchor="middle">CH6</text>
      
      <rect x="60" y="30" width="25" height="20" fill="none" stroke="#ecc94b" stroke-width="1"/>
      <text x="72" y="44" font-family="Courier New, monospace" font-size="7" fill="#ecc94b" text-anchor="middle">CH7</text>
      
      <rect x="90" y="30" width="25" height="20" fill="none" stroke="#ecc94b" stroke-width="1"/>
      <text x="102" y="44" font-family="Courier New, monospace" font-size="7" fill="#ecc94b" text-anchor="middle">CH8</text>
    </g>
    
    <text x="0" y="75" font-family="Courier New, monospace" font-size="8" fill="#a0aec0" text-anchor="middle">0-200V OUTPUT</text>
  </g>
  
  <!-- DDS to HV Amps -->
  <line x1="760" y1="150" x2="840" y2="180" stroke="#805ad5" stroke-width="1.5" marker-end="url(#sigArrow)"/>
  <text x="790" y="155" font-family="Courier New, monospace" font-size="7" fill="#805ad5">SINE</text>
  
  <!-- DAC to HV Amps -->
  <line x1="760" y1="280" x2="840" y2="250" stroke="#38a169" stroke-width="1.5" marker-end="url(#sigArrow)"/>
  <text x="790" y="275" font-family="Courier New, monospace" font-size="7" fill="#38a169">CTRL</text>
  
  <!-- HV supply to HV Amps -->
  <line x1="330" y1="310" x2="840" y2="310" stroke="#f56565" stroke-width="2"/>
  <line x1="840" y1="310" x2="840" y2="280" stroke="#f56565" stroke-width="2" marker-end="url(#pwrArrow)"/>
  <text x="580" y="305" font-family="Courier New, monospace" font-size="8" fill="#f56565">200V HV RAIL</text>
  
  <!-- ============== PIEZO ARRAY ============== -->
  <g transform="translate(920, 450)">
    <rect x="-80" y="-50" width="160" height="100" fill="#0d2137" stroke="#ecc94b" stroke-width="2"/>
    <text x="0" y="-25" font-family="Courier New, monospace" font-size="12" fill="#ecc94b" text-anchor="middle">PIEZO ARRAY</text>
    <text x="0" y="-8" font-family="Courier New, monospace" font-size="9" fill="#a0aec0" text-anchor="middle">8× PZT-5H</text>
    
    <!-- Piezo symbols -->
    <g transform="translate(-50, 10)">
      <polygon points="0,0 15,15 30,0" fill="none" stroke="#ecc94b" stroke-width="1"/>
      <line x1="0" y1="0" x2="30" y2="0" stroke="#ecc94b" stroke-width="1"/>
      <line x1="15" y1="15" x2="15" y2="25" stroke="#ecc94b" stroke-width="1"/>
    </g>
    <g transform="translate(20, 10)">
      <polygon points="0,0 15,15 30,0" fill="none" stroke="#ecc94b" stroke-width="1"/>
      <line x1="0" y1="0" x2="30" y2="0" stroke="#ecc94b" stroke-width="1"/>
      <line x1="15" y1="15" x2="15" y2="25" stroke="#ecc94b" stroke-width="1"/>
    </g>
  </g>
  
  <!-- HV Amps to Piezo -->
  <line x1="920" y1="310" x2="920" y2="400" stroke="#ecc94b" stroke-width="2" marker-end="url(#sigArrow)"/>
  <text x="930" y="360" font-family="Courier New, monospace" font-size="8" fill="#ecc94b">8× HV</text>
  
  <!-- ============== SENSORS ============== -->
  <g transform="translate(500, 450)">
    <rect x="-120" y="-60" width="240" height="120" fill="#0d2137" stroke="#4299e1" stroke-width="2"/>
    <text x="0" y="-40" font-family="Courier New, monospace" font-size="11" fill="#4299e1" text-anchor="middle">SENSOR ARRAY</text>
    
    <!-- Sensor boxes -->
    <g transform="translate(-100, -20)">
      <rect x="0" y="0" width="55" height="35" fill="none" stroke="#48bb78" stroke-width="1"/>
      <text x="27" y="15" font-family="Courier New, monospace" font-size="7" fill="#48bb78" text-anchor="middle">PT1000×4</text>
      <text x="27" y="27" font-family="Courier New, monospace" font-size="6" fill="#a0aec0" text-anchor="middle">TEMP</text>
    </g>
    
    <g transform="translate(-35, -20)">
      <rect x="0" y="0" width="55" height="35" fill="none" stroke="#805ad5" stroke-width="1"/>
      <text x="27" y="15" font-family="Courier New, monospace" font-size="7" fill="#805ad5" text-anchor="middle">MAX31865</text>
      <text x="27" y="27" font-family="Courier New, monospace" font-size="6" fill="#a0aec0" text-anchor="middle">RTD ADC</text>
    </g>
    
    <g transform="translate(30, -20)">
      <rect x="0" y="0" width="55" height="35" fill="none" stroke="#ed8936" stroke-width="1"/>
      <text x="27" y="15" font-family="Courier New, monospace" font-size="7" fill="#ed8936" text-anchor="middle">ADXL355</text>
      <text x="27" y="27" font-family="Courier New, monospace" font-size="6" fill="#a0aec0" text-anchor="middle">6-DOF</text>
    </g>
    
    <g transform="translate(-35, 25)">
      <rect x="0" y="0" width="70" height="25" fill="none" stroke="#f56565" stroke-width="1"/>
      <text x="35" y="16" font-family="Courier New, monospace" font-size="7" fill="#f56565" text-anchor="middle">PIRANI GAUGE</text>
    </g>
  </g>
  
  <!-- MCU to Sensors -->
  <line x1="500" y1="270" x2="500" y2="390" stroke="#4299e1" stroke-width="1.5" marker-end="url(#sigArrow)"/>
  <text x="510" y="340" font-family="Courier New, monospace" font-size="7" fill="#4299e1">ADC/SPI</text>
  
  <!-- ============== USB INTERFACE ============== -->
  <g transform="translate(500, 600)">
    <rect x="-60" y="-30" width="120" height="60" fill="#0d2137" stroke="#ecc94b" stroke-width="2"/>
    <text x="0" y="-8" font-family="Courier New, monospace" font-size="10" fill="#ecc94b" text-anchor="middle">FT232RL</text>
    <text x="0" y="10" font-family="Courier New, monospace" font-size="9" fill="#a0aec0" text-anchor="middle">USB-UART</text>
    
    <!-- USB symbol -->
    <rect x="-15" y="20" width="30" height="15" fill="none" stroke="#ecc94b" stroke-width="1"/>
    <text x="0" y="32" font-family="Courier New, monospace" font-size="6" fill="#ecc94b" text-anchor="middle">USB</text>
  </g>
  
  <!-- MCU to USB -->
  <line x1="430" y1="255" x2="380" y2="255" stroke="#ecc94b" stroke-width="1"/>
  <line x1="380" y1="255" x2="380" y2="600" stroke="#ecc94b" stroke-width="1"/>
  <line x1="380" y1="600" x2="440" y2="600" stroke="#ecc94b" stroke-width="1.5" marker-end="url(#sigArrow)"/>
  <text x="365" y="430" font-family="Courier New, monospace" font-size="7" fill="#ecc94b" transform="rotate(-90,365,430)">UART3</text>
  
  <!-- ============== E-STOP ============== -->
  <g transform="translate(200, 450)">
    <circle cx="0" cy="0" r="35" fill="#742a2a" stroke="#f56565" stroke-width="3"/>
    <text x="0" y="5" font-family="Courier New, monospace" font-size="10" fill="#f56565" text-anchor="middle">E-STOP</text>
    
    <text x="0" y="55" font-family="Courier New, monospace" font-size="8" fill="#a0aec0" text-anchor="middle">HARDWARE</text>
    <text x="0" y="68" font-family="Courier New, monospace" font-size="8" fill="#a0aec0" text-anchor="middle">INTERLOCK</text>
  </g>
  
  <!-- E-STOP to MCU -->
  <line x1="235" y1="430" x2="420" y2="240" stroke="#f56565" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="320" y="320" font-family="Courier New, monospace" font-size="7" fill="#f56565">EXTI (NC)</text>
  
  <!-- E-STOP to HV -->
  <line x1="200" y1="415" x2="200" y2="310" stroke="#f56565" stroke-width="2"/>
  <line x1="200" y1="310" x2="230" y2="310" stroke="#f56565" stroke-width="2"/>
  <circle cx="215" cy="310" r="5" fill="#f56565"/>
  <text x="215" y="295" font-family="Courier New, monospace" font-size="7" fill="#f56565" text-anchor="middle">CUT</text>
  
  <!-- ============== LEGEND ============== -->
  <g transform="translate(100, 700)">
    <rect x="-60" y="-50" width="250" height="100" fill="#0d2137" stroke="#4a6fa5" stroke-width="1"/>
    <text x="65" y="-30" font-family="Courier New, monospace" font-size="10" fill="#f6ad55" text-anchor="middle">LEGEND</text>
    
    <line x1="-40" y1="-10" x2="0" y2="-10" stroke="#ed8936" stroke-width="2"/>
    <text x="10" y="-6" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">POWER (24V/200V)</text>
    
    <line x1="-40" y1="10" x2="0" y2="10" stroke="#48bb78" stroke-width="2"/>
    <text x="10" y="14" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">SIGNAL (5V/LOGIC)</text>
    
    <line x1="-40" y1="30" x2="0" y2="30" stroke="#f56565" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="10" y="34" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">SAFETY INTERLOCK</text>
  </g>
  
  <!-- ============== POWER BUDGET ============== -->
  <g transform="translate(500, 750)">
    <rect x="-200" y="-50" width="400" height="100" fill="#0d2137" stroke="#4a6fa5" stroke-width="1"/>
    <text x="0" y="-30" font-family="Courier New, monospace" font-size="10" fill="#f6ad55" text-anchor="middle">POWER BUDGET</text>
    
    <text x="-180" y="-8" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">MCU + Logic:</text>
    <text x="-80" y="-8" font-family="Courier New, monospace" font-size="8" fill="#e2e8f0">~2W</text>
    
    <text x="-180" y="8" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">DDS + DAC:</text>
    <text x="-80" y="8" font-family="Courier New, monospace" font-size="8" fill="#e2e8f0">~3W</text>
    
    <text x="-180" y="24" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">HV Amps (peak):</text>
    <text x="-80" y="24" font-family="Courier New, monospace" font-size="8" fill="#e2e8f0">~40W</text>
    
    <text x="-180" y="40" font-family="Courier New, monospace" font-size="8" fill="#f6ad55">TOTAL (peak):</text>
    <text x="-80" y="40" font-family="Courier New, monospace" font-size="8" fill="#f6ad55">~50W</text>
    
    <text x="50" y="-8" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">5V Rail:</text>
    <text x="130" y="-8" font-family="Courier New, monospace" font-size="8" fill="#48bb78">1.5A max</text>
    
    <text x="50" y="8" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">200V Rail:</text>
    <text x="130" y="8" font-family="Courier New, monospace" font-size="8" fill="#f56565">250mA max</text>
    
    <text x="50" y="24" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">24V Input:</text>
    <text x="130" y="24" font-family="Courier New, monospace" font-size="8" fill="#ed8936">5A max</text>
  </g>
</svg>
