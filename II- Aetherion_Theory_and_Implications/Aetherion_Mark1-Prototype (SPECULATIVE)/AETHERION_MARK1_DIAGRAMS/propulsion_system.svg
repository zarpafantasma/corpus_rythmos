<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <defs>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#48bb78"/>
      <stop offset="50%" style="stop-color:#38a169"/>
      <stop offset="100%" style="stop-color:#276749"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4299e1"/>
      <stop offset="100%" style="stop-color:#2b6cb0"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="700" fill="#1a202c"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0">TPH / OMV PROPULSION SYSTEM</text>
  <text x="450" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a0aec0">Temporal Pulse Hierarchy + Oscillatory Modulation of Vacuum</text>
  
  <!-- Left Panel: TPH Mode -->
  <rect x="30" y="80" width="400" height="280" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="10"/>
  <text x="230" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#48bb78">TPH MODE</text>
  <text x="230" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a0aec0">Pulsed Asymmetric Thrust</text>
  
  <!-- TPH Waveform -->
  <rect x="50" y="140" width="360" height="100" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  <text x="60" y="155" font-family="Arial, sans-serif" font-size="9" fill="#718096">Voltage (V)</text>
  
  <!-- Axis -->
  <line x1="80" y1="220" x2="390" y2="220" stroke="#4a5568" stroke-width="1"/>
  <line x1="80" y1="155" x2="80" y2="225" stroke="#4a5568" stroke-width="1"/>
  
  <!-- Pulse waveform -->
  <path d="M90 220 L90 160 L120 160 L120 220 L180 220 L180 160 L210 160 L210 220 L270 220 L270 160 L300 160 L300 220 L360 220 L360 160 L390 160" 
        stroke="#48bb78" stroke-width="2" fill="none"/>
  
  <!-- Labels -->
  <text x="85" y="158" font-family="Arial, sans-serif" font-size="8" fill="#48bb78">200V</text>
  <text x="85" y="222" font-family="Arial, sans-serif" font-size="8" fill="#718096">0V</text>
  <text x="230" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#718096">Time (ms) | τ_rise = 50µs | Rep: 1kHz</text>
  
  <!-- TPH mechanism diagram -->
  <rect x="50" y="250" width="160" height="100" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  <text x="130" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">STATIC ∇α</text>
  
  <!-- Static gradient arrows -->
  <g fill="#805ad5" opacity="0.7">
    <polygon points="70,290 85,285 85,295"/>
    <polygon points="90,290 105,285 105,295"/>
    <polygon points="110,290 125,285 125,295"/>
    <polygon points="130,290 145,285 145,295"/>
    <polygon points="150,290 165,285 165,295"/>
    <polygon points="170,290 185,285 185,295"/>
  </g>
  
  <text x="130" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#805ad5">Symmetric (No thrust)</text>
  
  <!-- Plus sign -->
  <text x="220" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#48bb78">+</text>
  
  <!-- Pulse wave -->
  <rect x="240" y="250" width="160" height="100" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  <text x="320" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">TRAVELING ∇L</text>
  
  <!-- Traveling wave visualization -->
  <rect x="255" y="280" width="30" height="30" fill="#48bb78" opacity="0.9"/>
  <rect x="290" y="280" width="30" height="30" fill="#48bb78" opacity="0.6"/>
  <rect x="325" y="280" width="30" height="30" fill="#48bb78" opacity="0.3"/>
  <rect x="360" y="280" width="25" height="30" fill="#48bb78" opacity="0.1"/>
  
  <text x="320" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#48bb78">Piezo shock wave →</text>
  
  <!-- Right Panel: OMV Mode -->
  <rect x="470" y="80" width="400" height="280" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="10"/>
  <text x="670" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4299e1">OMV MODE</text>
  <text x="670" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a0aec0">Continuous Ponderomotive Thrust</text>
  
  <!-- OMV Waveform -->
  <rect x="490" y="140" width="360" height="100" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  <text x="500" y="155" font-family="Arial, sans-serif" font-size="9" fill="#718096">α(t)</text>
  
  <!-- Sine wave -->
  <path d="M510 190 Q530 150, 550 190 Q570 230, 590 190 Q610 150, 630 190 Q650 230, 670 190 Q690 150, 710 190 Q730 230, 750 190 Q770 150, 790 190 Q810 230, 830 190" 
        stroke="#4299e1" stroke-width="2" fill="none"/>
  
  <!-- DC component line -->
  <line x1="510" y1="190" x2="830" y2="190" stroke="#ed8936" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="840" y="193" font-family="Arial, sans-serif" font-size="8" fill="#ed8936">DC</text>
  
  <text x="670" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#718096">α(t) = α₀ + Δα·cos(ωt) | f = 2kHz</text>
  
  <!-- OMV Math -->
  <rect x="490" y="250" width="360" height="100" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  <text x="670" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">Ponderomotive Rectification</text>
  
  <text x="670" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4299e1">F ∝ (∇α)² = (∇α₀)² · cos²(ωt)</text>
  <text x="670" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ed8936">cos²(ωt) = ½[1 + cos(2ωt)]</text>
  <text x="670" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#48bb78" font-weight="bold">↑ DC Component = Net Thrust</text>
  
  <!-- Bottom Section: Operating Modes Comparison -->
  <rect x="30" y="380" width="840" height="180" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="10"/>
  <text x="450" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0">OPERATING MODE COMPARISON</text>
  
  <!-- Table -->
  <line x1="50" y1="420" x2="850" y2="420" stroke="#4a5568" stroke-width="1"/>
  
  <!-- Headers -->
  <text x="150" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a0aec0" font-weight="bold">Parameter</text>
  <text x="350" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#48bb78" font-weight="bold">TPH Mode</text>
  <text x="550" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4299e1" font-weight="bold">OMV Mode</text>
  <text x="750" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ed8936" font-weight="bold">Hybrid</text>
  
  <line x1="50" y1="450" x2="850" y2="450" stroke="#4a5568" stroke-width="1"/>
  
  <!-- Data rows -->
  <text x="150" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0">Waveform</text>
  <text x="350" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Sharp Pulse</text>
  <text x="550" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Sine Wave</text>
  <text x="750" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Modulated Pulse</text>
  
  <text x="150" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0">Thrust Type</text>
  <text x="350" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Impulse (pN·s)</text>
  <text x="550" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">DC Force (pN)</text>
  <text x="750" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Both</text>
  
  <text x="150" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0">Magnitude</text>
  <text x="350" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#48bb78">123 pN·s/pulse</text>
  <text x="550" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4299e1">197 pN DC</text>
  <text x="750" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ed8936">~500 nN @ 10kHz</text>
  
  <text x="150" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0">Application</text>
  <text x="350" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Maneuvering</text>
  <text x="550" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Station-keeping</text>
  <text x="750" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Full flight</text>
  
  <!-- Bottom: Piezo Ring Diagram -->
  <rect x="30" y="575" width="400" height="110" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="10"/>
  <text x="230" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">PIEZO RING (Top View)</text>
  
  <!-- Ring with 8 actuators -->
  <circle cx="230" cy="650" r="40" fill="none" stroke="#4a5568" stroke-width="2"/>
  <circle cx="230" cy="650" r="25" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  
  <!-- 8 Piezo elements -->
  <rect x="223" y="605" width="14" height="10" fill="#ecc94b" stroke="#d69e2e" stroke-width="1"/>
  <text x="230" y="602" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">P1</text>
  
  <rect x="256" y="618" width="14" height="10" fill="#ecc94b" stroke="#d69e2e" stroke-width="1" transform="rotate(45, 263, 623)"/>
  <text x="272" y="618" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">P2</text>
  
  <rect x="265" y="643" width="14" height="10" fill="#ecc94b" stroke="#d69e2e" stroke-width="1"/>
  <text x="285" y="652" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">P3</text>
  
  <rect x="256" y="672" width="14" height="10" fill="#ecc94b" stroke="#d69e2e" stroke-width="1" transform="rotate(-45, 263, 677)"/>
  <text x="272" y="688" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">P4</text>
  
  <rect x="223" y="685" width="14" height="10" fill="#ecc94b" stroke="#d69e2e" stroke-width="1"/>
  <text x="230" y="700" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">P5</text>
  
  <rect x="190" y="672" width="14" height="10" fill="#ecc94b" stroke="#d69e2e" stroke-width="1" transform="rotate(45, 197, 677)"/>
  <text x="178" y="688" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">P6</text>
  
  <rect x="181" y="643" width="14" height="10" fill="#ecc94b" stroke="#d69e2e" stroke-width="1"/>
  <text x="172" y="652" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">P7</text>
  
  <rect x="190" y="618" width="14" height="10" fill="#ecc94b" stroke="#d69e2e" stroke-width="1" transform="rotate(-45, 197, 623)"/>
  <text x="178" y="618" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">P8</text>
  
  <!-- Firing sequence -->
  <text x="330" y="630" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">Firing Sequence:</text>
  <text x="330" y="645" font-family="Arial, sans-serif" font-size="8" fill="#48bb78">t=0: P1,P2 →</text>
  <text x="330" y="658" font-family="Arial, sans-serif" font-size="8" fill="#48bb78">t=τ/4: P3 →</text>
  <text x="330" y="671" font-family="Arial, sans-serif" font-size="8" fill="#48bb78">t=τ/2: P4,P5 →</text>
  <text x="330" y="684" font-family="Arial, sans-serif" font-size="8" fill="#48bb78">Traveling wave CW</text>
  
  <!-- Thrust output diagram -->
  <rect x="470" y="575" width="400" height="110" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="10"/>
  <text x="670" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">THRUST vs FREQUENCY</text>
  
  <!-- Graph -->
  <rect x="500" y="615" width="200" height="60" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  <line x1="520" y1="665" x2="680" y2="665" stroke="#4a5568" stroke-width="1"/>
  <line x1="520" y1="625" x2="520" y2="670" stroke="#4a5568" stroke-width="1"/>
  
  <!-- Linear thrust curve -->
  <line x1="520" y1="665" x2="680" y2="625" stroke="#48bb78" stroke-width="2"/>
  
  <text x="510" y="630" font-family="Arial, sans-serif" font-size="7" fill="#48bb78">500nN</text>
  <text x="510" y="668" font-family="Arial, sans-serif" font-size="7" fill="#718096">0</text>
  <text x="520" y="678" font-family="Arial, sans-serif" font-size="7" fill="#718096">0</text>
  <text x="680" y="678" font-family="Arial, sans-serif" font-size="7" fill="#718096">10kHz</text>
  
  <!-- Results -->
  <text x="780" y="630" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Results:</text>
  <text x="780" y="650" font-family="Arial, sans-serif" font-size="9" fill="#48bb78">F ≈ 50 nN/kHz</text>
  <text x="780" y="668" font-family="Arial, sans-serif" font-size="9" fill="#4299e1">Monte Carlo: ✓</text>
  
</svg>
