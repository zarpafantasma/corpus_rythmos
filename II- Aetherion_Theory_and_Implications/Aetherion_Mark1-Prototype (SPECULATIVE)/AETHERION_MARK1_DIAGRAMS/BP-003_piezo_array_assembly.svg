<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <pattern id="gridSmall3" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#1e3a5f" stroke-width="0.5"/>
    </pattern>
    <pattern id="gridLarge3" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#gridSmall3)"/>
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#2a4a6f" stroke-width="1"/>
    </pattern>
    <marker id="dimArrowL3" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 8 6, 0 3" fill="#e2e8f0"/>
    </marker>
    <marker id="dimArrowR3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 0 6, 8 3" fill="#e2e8f0"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="900" fill="#0a1628"/>
  <rect width="1200" height="900" fill="url(#gridLarge3)"/>
  
  <!-- Border frame -->
  <rect x="20" y="20" width="1160" height="860" fill="none" stroke="#4a6fa5" stroke-width="2"/>
  <rect x="25" y="25" width="1150" height="850" fill="none" stroke="#4a6fa5" stroke-width="1"/>
  
  <!-- Title block -->
  <rect x="850" y="780" width="320" height="90" fill="#0d2137" stroke="#4a6fa5" stroke-width="1"/>
  <line x1="850" y1="810" x2="1170" y2="810" stroke="#4a6fa5" stroke-width="1"/>
  <line x1="850" y1="840" x2="1170" y2="840" stroke="#4a6fa5" stroke-width="1"/>
  <line x1="1000" y1="810" x2="1000" y2="870" stroke="#4a6fa5" stroke-width="1"/>
  
  <text x="860" y="800" font-family="Courier New, monospace" font-size="12" fill="#e2e8f0">AETHERION MARK 1</text>
  <text x="860" y="828" font-family="Courier New, monospace" font-size="10" fill="#a0aec0">PIEZO ARRAY ASSEMBLY</text>
  <text x="860" y="858" font-family="Courier New, monospace" font-size="9" fill="#a0aec0">SCALE: 3:1</text>
  <text x="1010" y="828" font-family="Courier New, monospace" font-size="9" fill="#a0aec0">DWG: ATP-MK1-BP-003</text>
  <text x="1010" y="858" font-family="Courier New, monospace" font-size="9" fill="#a0aec0">REV: 1.0</text>
  
  <!-- View labels -->
  <text x="300" y="55" font-family="Courier New, monospace" font-size="14" fill="#f6ad55" text-anchor="middle">TOP VIEW - PIEZO RING</text>
  <text x="850" y="55" font-family="Courier New, monospace" font-size="14" fill="#f6ad55" text-anchor="middle">SECTION B-B</text>
  <text x="300" y="480" font-family="Courier New, monospace" font-size="14" fill="#f6ad55" text-anchor="middle">PHASE DIAGRAM (TPH MODE)</text>
  
  <!-- ============== TOP VIEW - PIEZO RING ============== -->
  <g transform="translate(300, 250)">
    <!-- Center lines -->
    <line x1="-200" y1="0" x2="200" y2="0" stroke="#f6ad55" stroke-width="0.5" stroke-dasharray="12,3,3,3"/>
    <line x1="0" y1="-200" x2="0" y2="200" stroke="#f6ad55" stroke-width="0.5" stroke-dasharray="12,3,3,3"/>
    
    <!-- Mounting ring outer -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
    
    <!-- Mounting ring inner -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
    
    <!-- Core outline (hidden) -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#a0aec0" stroke-width="0.5" stroke-dasharray="5,3"/>
    
    <!-- 8 Piezo elements at 45° intervals -->
    <!-- P1 (0°) -->
    <g transform="rotate(0)">
      <rect x="105" y="-15" width="30" height="30" fill="none" stroke="#ecc94b" stroke-width="2"/>
      <text x="120" y="35" font-family="Courier New, monospace" font-size="10" fill="#ecc94b" text-anchor="middle">P1</text>
      <text x="120" y="48" font-family="Courier New, monospace" font-size="8" fill="#48bb78" text-anchor="middle">0°</text>
    </g>
    
    <!-- P2 (45°) -->
    <g transform="rotate(45)">
      <rect x="105" y="-15" width="30" height="30" fill="none" stroke="#ecc94b" stroke-width="2"/>
      <text x="155" y="5" font-family="Courier New, monospace" font-size="10" fill="#ecc94b" text-anchor="middle" transform="rotate(-45, 155, 5)">P2</text>
    </g>
    
    <!-- P3 (90°) -->
    <g transform="rotate(90)">
      <rect x="105" y="-15" width="30" height="30" fill="none" stroke="#ecc94b" stroke-width="2"/>
      <text x="120" y="-35" font-family="Courier New, monospace" font-size="10" fill="#ecc94b" text-anchor="middle" transform="rotate(-90, 120, -35)">P3</text>
    </g>
    
    <!-- P4 (135°) -->
    <g transform="rotate(135)">
      <rect x="105" y="-15" width="30" height="30" fill="none" stroke="#ecc94b" stroke-width="2"/>
    </g>
    
    <!-- P5 (180°) -->
    <g transform="rotate(180)">
      <rect x="105" y="-15" width="30" height="30" fill="none" stroke="#ecc94b" stroke-width="2"/>
      <text x="120" y="-35" font-family="Courier New, monospace" font-size="10" fill="#ecc94b" text-anchor="middle" transform="rotate(-180, 120, -35)">P5</text>
    </g>
    
    <!-- P6 (225°) -->
    <g transform="rotate(225)">
      <rect x="105" y="-15" width="30" height="30" fill="none" stroke="#ecc94b" stroke-width="2"/>
    </g>
    
    <!-- P7 (270°) -->
    <g transform="rotate(270)">
      <rect x="105" y="-15" width="30" height="30" fill="none" stroke="#ecc94b" stroke-width="2"/>
      <text x="120" y="-35" font-family="Courier New, monospace" font-size="10" fill="#ecc94b" text-anchor="middle" transform="rotate(-270, 120, -35)">P7</text>
    </g>
    
    <!-- P8 (315°) -->
    <g transform="rotate(315)">
      <rect x="105" y="-15" width="30" height="30" fill="none" stroke="#ecc94b" stroke-width="2"/>
    </g>
    
    <!-- Mounting holes -->
    <circle cx="0" cy="-140" r="5" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="140" cy="0" r="5" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="0" cy="140" r="5" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="-140" cy="0" r="5" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Section line B-B -->
    <line x1="-180" y1="0" x2="-160" y2="0" stroke="#48bb78" stroke-width="1.5"/>
    <line x1="160" y1="0" x2="180" y2="0" stroke="#48bb78" stroke-width="1.5"/>
    <text x="-190" y="5" font-family="Courier New, monospace" font-size="12" fill="#48bb78">B</text>
    <text x="190" y="5" font-family="Courier New, monospace" font-size="12" fill="#48bb78">B</text>
    <polygon points="-165,5 -165,-5 -175,0" fill="#48bb78"/>
    <polygon points="165,5 165,-5 175,0" fill="#48bb78"/>
    
    <!-- Dimensions -->
    <!-- Outer diameter -->
    <line x1="-150" y1="170" x2="-150" y2="185" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="150" y1="170" x2="150" y2="185" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="-150" y1="180" x2="150" y2="180" stroke="#e2e8f0" stroke-width="0.5" marker-start="url(#dimArrowL3)" marker-end="url(#dimArrowR3)"/>
    <text x="0" y="195" font-family="Courier New, monospace" font-size="9" fill="#e2e8f0" text-anchor="middle">Ø50 (RING OD)</text>
    
    <!-- Piezo size -->
    <line x1="140" y1="-18" x2="155" y2="-35" stroke="#ecc94b" stroke-width="0.5"/>
    <text x="160" y="-35" font-family="Courier New, monospace" font-size="8" fill="#ecc94b">5×5×2mm</text>
    <text x="160" y="-25" font-family="Courier New, monospace" font-size="7" fill="#a0aec0">PZT-5H</text>
  </g>
  
  <!-- ============== SECTION B-B ============== -->
  <g transform="translate(850, 250)">
    <!-- Housing outline -->
    <rect x="-180" y="-80" width="360" height="160" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
    
    <!-- Core (center) -->
    <rect x="-100" y="-60" width="200" height="120" fill="none" stroke="#805ad5" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="0" y="0" font-family="Courier New, monospace" font-size="8" fill="#805ad5" text-anchor="middle">CORE</text>
    
    <!-- Piezo elements (left and right) -->
    <rect x="-150" y="-20" width="30" height="40" fill="none" stroke="#ecc94b" stroke-width="2"/>
    <rect x="120" y="-20" width="30" height="40" fill="none" stroke="#ecc94b" stroke-width="2"/>
    
    <!-- Piezo hatching -->
    <g stroke="#ecc94b" stroke-width="0.5">
      <line x1="-145" y1="-15" x2="-125" y2="15"/>
      <line x1="-140" y1="-15" x2="-120" y2="15"/>
      <line x1="-135" y1="-15" x2="-125" y2="-5"/>
      <line x1="125" y1="-15" x2="145" y2="15"/>
      <line x1="130" y1="-15" x2="150" y2="15"/>
      <line x1="145" y1="-5" x2="150" y2="0"/>
    </g>
    
    <!-- TIM layer -->
    <rect x="-150" y="-25" width="30" height="5" fill="#48bb78"/>
    <rect x="120" y="-25" width="30" height="5" fill="#48bb78"/>
    <text x="-135" y="-30" font-family="Courier New, monospace" font-size="6" fill="#48bb78" text-anchor="middle">TIM</text>
    
    <!-- Mounting ring -->
    <rect x="-180" y="-30" width="25" height="60" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="155" y="-30" width="25" height="60" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Ring hatching -->
    <g stroke="#4a6fa5" stroke-width="0.3">
      <line x1="-180" y1="-30" x2="-155" y2="-5"/>
      <line x1="-180" y1="-15" x2="-155" y2="10"/>
      <line x1="-180" y1="0" x2="-155" y2="25"/>
      <line x1="-180" y1="15" x2="-155" y2="30"/>
      <line x1="155" y1="-30" x2="180" y2="-5"/>
      <line x1="155" y1="-15" x2="180" y2="10"/>
      <line x1="155" y1="0" x2="180" y2="25"/>
      <line x1="155" y1="15" x2="180" y2="30"/>
    </g>
    
    <!-- Wiring channels -->
    <line x1="-135" y1="20" x2="-135" y2="60" stroke="#ed8936" stroke-width="1"/>
    <line x1="135" y1="20" x2="135" y2="60" stroke="#ed8936" stroke-width="1"/>
    <text x="-135" y="75" font-family="Courier New, monospace" font-size="7" fill="#ed8936" text-anchor="middle">HV+</text>
    <text x="135" y="75" font-family="Courier New, monospace" font-size="7" fill="#ed8936" text-anchor="middle">HV+</text>
    
    <!-- GND return -->
    <line x1="-155" y1="30" x2="-155" y2="60" stroke="#4299e1" stroke-width="1"/>
    <line x1="155" y1="30" x2="155" y2="60" stroke="#4299e1" stroke-width="1"/>
    
    <!-- Dimensions -->
    <!-- Piezo height -->
    <line x1="-160" y1="-20" x2="-175" y2="-20" stroke="#ecc94b" stroke-width="0.5"/>
    <line x1="-160" y1="20" x2="-175" y2="20" stroke="#ecc94b" stroke-width="0.5"/>
    <line x1="-170" y1="-20" x2="-170" y2="20" stroke="#ecc94b" stroke-width="0.5" marker-start="url(#dimArrowL3)" marker-end="url(#dimArrowR3)"/>
    <text x="-185" y="5" font-family="Courier New, monospace" font-size="8" fill="#ecc94b" transform="rotate(-90,-185,5)">2</text>
    
    <!-- Labels -->
    <text x="-135" y="0" font-family="Courier New, monospace" font-size="8" fill="#ecc94b" text-anchor="middle">P1</text>
    <text x="135" y="0" font-family="Courier New, monospace" font-size="8" fill="#ecc94b" text-anchor="middle">P5</text>
  </g>
  
  <!-- ============== PHASE DIAGRAM ============== -->
  <g transform="translate(300, 680)">
    <rect x="-250" y="-150" width="500" height="300" fill="#0d2137" stroke="#4a6fa5" stroke-width="1"/>
    
    <text x="0" y="-130" font-family="Courier New, monospace" font-size="12" fill="#f6ad55" text-anchor="middle">TPH TRAVELING WAVE - PHASE SEQUENCE</text>
    
    <!-- Circular phase diagram -->
    <circle cx="-100" cy="20" r="100" fill="none" stroke="#4a6fa5" stroke-width="1"/>
    
    <!-- Phase vectors -->
    <!-- P1: 0° -->
    <line x1="-100" y1="20" x2="0" y2="20" stroke="#ecc94b" stroke-width="2"/>
    <circle cx="0" cy="20" r="8" fill="#ecc94b"/>
    <text x="15" y="25" font-family="Courier New, monospace" font-size="9" fill="#ecc94b">P1: 0°</text>
    
    <!-- P2: 45° -->
    <line x1="-100" y1="20" x2="-29" y2="-51" stroke="#48bb78" stroke-width="2"/>
    <circle cx="-29" cy="-51" r="8" fill="#48bb78"/>
    <text x="-15" y="-55" font-family="Courier New, monospace" font-size="9" fill="#48bb78">P2: 45°</text>
    
    <!-- P3: 90° -->
    <line x1="-100" y1="20" x2="-100" y2="-80" stroke="#4299e1" stroke-width="2"/>
    <circle cx="-100" cy="-80" r="8" fill="#4299e1"/>
    <text x="-100" y="-95" font-family="Courier New, monospace" font-size="9" fill="#4299e1" text-anchor="middle">P3: 90°</text>
    
    <!-- P4: 135° -->
    <line x1="-100" y1="20" x2="-171" y2="-51" stroke="#805ad5" stroke-width="2"/>
    <circle cx="-171" cy="-51" r="8" fill="#805ad5"/>
    
    <!-- P5: 180° -->
    <line x1="-100" y1="20" x2="-200" y2="20" stroke="#ed8936" stroke-width="2"/>
    <circle cx="-200" cy="20" r="8" fill="#ed8936"/>
    <text x="-220" y="25" font-family="Courier New, monospace" font-size="9" fill="#ed8936" text-anchor="end">P5: 180°</text>
    
    <!-- P6: 225° -->
    <line x1="-100" y1="20" x2="-171" y2="91" stroke="#f56565" stroke-width="2"/>
    <circle cx="-171" cy="91" r="8" fill="#f56565"/>
    
    <!-- P7: 270° -->
    <line x1="-100" y1="20" x2="-100" y2="120" stroke="#d69e2e" stroke-width="2"/>
    <circle cx="-100" cy="120" r="8" fill="#d69e2e"/>
    <text x="-100" y="140" font-family="Courier New, monospace" font-size="9" fill="#d69e2e" text-anchor="middle">P7: 270°</text>
    
    <!-- P8: 315° -->
    <line x1="-100" y1="20" x2="-29" y2="91" stroke="#38a169" stroke-width="2"/>
    <circle cx="-29" cy="91" r="8" fill="#38a169"/>
    
    <!-- Center -->
    <circle cx="-100" cy="20" r="5" fill="#e2e8f0"/>
    
    <!-- Waveform timing diagram -->
    <g transform="translate(120, -80)">
      <text x="0" y="-30" font-family="Courier New, monospace" font-size="10" fill="#e2e8f0">TIMING (1 kHz = 1ms period)</text>
      
      <!-- Time axis -->
      <line x1="0" y1="0" x2="200" y2="0" stroke="#4a6fa5" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="180" stroke="#4a6fa5" stroke-width="1"/>
      
      <!-- Time labels -->
      <text x="0" y="-5" font-family="Courier New, monospace" font-size="7" fill="#a0aec0">0</text>
      <text x="50" y="-5" font-family="Courier New, monospace" font-size="7" fill="#a0aec0">250µs</text>
      <text x="100" y="-5" font-family="Courier New, monospace" font-size="7" fill="#a0aec0">500µs</text>
      <text x="150" y="-5" font-family="Courier New, monospace" font-size="7" fill="#a0aec0">750µs</text>
      <text x="200" y="-5" font-family="Courier New, monospace" font-size="7" fill="#a0aec0">1ms</text>
      
      <!-- P1 waveform -->
      <path d="M0,20 Q25,0 50,20 Q75,40 100,20 Q125,0 150,20 Q175,40 200,20" stroke="#ecc94b" stroke-width="1.5" fill="none"/>
      <text x="-20" y="25" font-family="Courier New, monospace" font-size="7" fill="#ecc94b">P1</text>
      
      <!-- P2 waveform (45° = 125µs delay) -->
      <path d="M12.5,45 Q37.5,25 62.5,45 Q87.5,65 112.5,45 Q137.5,25 162.5,45 Q187.5,65 200,55" stroke="#48bb78" stroke-width="1.5" fill="none"/>
      <text x="-20" y="50" font-family="Courier New, monospace" font-size="7" fill="#48bb78">P2</text>
      
      <!-- P3 waveform (90° = 250µs delay) -->
      <path d="M25,70 Q50,50 75,70 Q100,90 125,70 Q150,50 175,70 Q200,90 200,80" stroke="#4299e1" stroke-width="1.5" fill="none"/>
      <text x="-20" y="75" font-family="Courier New, monospace" font-size="7" fill="#4299e1">P3</text>
      
      <!-- P5 waveform (180° = 500µs delay) -->
      <path d="M50,120 Q75,100 100,120 Q125,140 150,120 Q175,100 200,120" stroke="#ed8936" stroke-width="1.5" fill="none"/>
      <text x="-20" y="125" font-family="Courier New, monospace" font-size="7" fill="#ed8936">P5</text>
      
      <!-- Traveling wave arrow -->
      <line x1="0" y1="160" x2="180" y2="160" stroke="#48bb78" stroke-width="2" marker-end="url(#dimArrowR3)"/>
      <text x="90" y="175" font-family="Courier New, monospace" font-size="8" fill="#48bb78" text-anchor="middle">WAVE PROPAGATION</text>
    </g>
  </g>
  
  <!-- ============== SPECIFICATIONS TABLE ============== -->
  <g transform="translate(850, 550)">
    <rect x="-180" y="-100" width="360" height="200" fill="#0d2137" stroke="#4a6fa5" stroke-width="1"/>
    
    <text x="0" y="-80" font-family="Courier New, monospace" font-size="12" fill="#f6ad55" text-anchor="middle">PIEZO SPECIFICATIONS</text>
    
    <line x1="-170" y1="-65" x2="170" y2="-65" stroke="#4a6fa5" stroke-width="0.5"/>
    
    <text x="-160" y="-48" font-family="Courier New, monospace" font-size="9" fill="#a0aec0">PARAMETER</text>
    <text x="60" y="-48" font-family="Courier New, monospace" font-size="9" fill="#a0aec0">VALUE</text>
    
    <line x1="-170" y1="-40" x2="170" y2="-40" stroke="#4a6fa5" stroke-width="0.5"/>
    
    <text x="-160" y="-22" font-family="Courier New, monospace" font-size="8" fill="#e2e8f0">Material</text>
    <text x="60" y="-22" font-family="Courier New, monospace" font-size="8" fill="#ecc94b">PZT-5H (Navy Type VI)</text>
    
    <text x="-160" y="-6" font-family="Courier New, monospace" font-size="8" fill="#e2e8f0">Dimensions</text>
    <text x="60" y="-6" font-family="Courier New, monospace" font-size="8" fill="#ecc94b">5 × 5 × 2 mm</text>
    
    <text x="-160" y="10" font-family="Courier New, monospace" font-size="8" fill="#e2e8f0">Quantity</text>
    <text x="60" y="10" font-family="Courier New, monospace" font-size="8" fill="#ecc94b">8 (radial array)</text>
    
    <text x="-160" y="26" font-family="Courier New, monospace" font-size="8" fill="#e2e8f0">d₃₃ Coefficient</text>
    <text x="60" y="26" font-family="Courier New, monospace" font-size="8" fill="#ecc94b">>600 pC/N</text>
    
    <text x="-160" y="42" font-family="Courier New, monospace" font-size="8" fill="#e2e8f0">Max Voltage</text>
    <text x="60" y="42" font-family="Courier New, monospace" font-size="8" fill="#ecc94b">200V (100V/mm)</text>
    
    <text x="-160" y="58" font-family="Courier New, monospace" font-size="8" fill="#e2e8f0">Curie Temp (Tc)</text>
    <text x="60" y="58" font-family="Courier New, monospace" font-size="8" fill="#f56565">195°C (CRITICAL)</text>
    
    <text x="-160" y="74" font-family="Courier New, monospace" font-size="8" fill="#e2e8f0">Operating Limit</text>
    <text x="60" y="74" font-family="Courier New, monospace" font-size="8" fill="#f56565">90°C MAX</text>
    
    <text x="-160" y="90" font-family="Courier New, monospace" font-size="8" fill="#e2e8f0">Phase Spacing</text>
    <text x="60" y="90" font-family="Courier New, monospace" font-size="8" fill="#48bb78">45° (360°/8)</text>
  </g>
  
  <!-- Notes -->
  <rect x="40" y="760" width="320" height="80" fill="#0d2137" stroke="#4a6fa5" stroke-width="1"/>
  <text x="50" y="780" font-family="Courier New, monospace" font-size="10" fill="#f6ad55">NOTES:</text>
  <text x="50" y="798" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">1. USE CONDUCTIVE EPOXY FOR MOUNTING (MG 8331S)</text>
  <text x="50" y="813" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">2. THERMAL INTERFACE MATERIAL REQUIRED</text>
  <text x="50" y="828" font-family="Courier New, monospace" font-size="8" fill="#a0aec0">3. SEE ADVISORY §1 FOR THERMAL LIMITS</text>
</svg>
